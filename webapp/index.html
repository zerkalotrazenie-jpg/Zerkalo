<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }
        .header {
            width: 100%;
            max-width: 600px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            border-radius: 16px;
            border: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 20px;
            background: linear-gradient(90deg, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .header .status {
            font-size: 12px;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .main {
            width: 100%;
            max-width: 600px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            flex: 1;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid #1a1a2e;
            padding: 16px;
            min-height: 300px;
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            background: rgba(240, 194, 127, 0.15);
            border: 1px solid rgba(240, 194, 127, 0.2);
            align-self: flex-end;
            margin-left: auto;
            text-align: right;
        }
        .message.assistant {
            background: rgba(255,255,255,0.05);
            border: 1px solid #1e1e2e;
            align-self: flex-start;
        }
        .message .time {
            font-size: 10px;
            color: #505060;
            margin-top: 4px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: scale(1.02); }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: linear-gradient(90deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            border: 1px solid #2a2a3e;
        }
        .btn-danger {
            background: rgba(252, 92, 125, 0.2);
            color: #fc5c7d;
            border: 1px solid rgba(252, 92, 125, 0.3);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .input-area {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #2a2a3e;
            background: rgba(255,255,255,0.03);
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .input-area input:focus { border-color: #f0c27f; }
        .input-area input::placeholder { color: #505060; }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #a0a0b0;
        }
        .status-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green { background: #4ade80; animation: pulse 1.5s infinite; }
        .dot.red { background: #fc5c7d; }
        .dot.yellow { background: #facc15; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .qr-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid #1a1a2e;
            padding: 16px;
            text-align: center;
            margin-top: 10px;
        }
        .qr-container img {
            max-width: 200px;
            border-radius: 12px;
            background: white;
            padding: 8px;
        }
        .hidden { display: none !important; }
        @media (max-width: 400px) {
            .controls { gap: 6px; }
            .btn { font-size: 12px; padding: 8px 14px; }
            .header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🪞 Зеркало</h1>
    <div class="status" id="connectionStatus">🟢 Готов</div>
</div>

<div class="main">
    <div class="chat-container" id="chatContainer">
        <div class="message assistant" id="welcomeMessage">
            <strong>🪞 Зеркало</strong><br>
            Ассаляму алейкум. Я — Зеркало.<br>
            Нажмите кнопку «🎤 Говорить», чтобы начать разговор.
            <div class="time" id="welcomeTime"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="startBtn">🎤 Говорить</button>
        <button class="btn btn-danger hidden" id="stopBtn">⏹ Остановить</button>
        <button class="btn btn-secondary" id="testBtn">🔊 Проверить микрофон</button>
    </div>

    <div class="input-area">
        <input type="text" id="textInput" placeholder="Напишите сообщение...">
        <button class="btn btn-primary" id="sendBtn">➤</button>
    </div>

    <div id="qrContainer" class="qr-container hidden">
        <img id="qrImage" src="" alt="QR-код">
        <div class="qr-info" id="qrInfo">Сумма: 0 ₸</div>
    </div>
</div>

<script>
    // ==========================================
    // 🪞 ЗЕРКАЛО — ИСПРАВЛЕННАЯ ВЕРСИЯ
    // ==========================================

    const chatContainer = document.getElementById('chatContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const testBtn = document.getElementById('testBtn');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const connectionStatus = document.getElementById('connectionStatus');

    let isListening = false;
    let recognition = null;
    let synthesis = window.speechSynthesis;
    let currentUtterance = null;

    // ==========================================
    // СТАТУС
    // ==========================================

    function setStatus(text, color = 'green') {
        const dot = connectionStatus;
        if (dot) {
            dot.textContent = text;
        }
    }

    // ==========================================
    // ДОБАВЛЕНИЕ СООБЩЕНИЙ
    // ==========================================

    function addMessage(text, sender = 'assistant') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        msgDiv.innerHTML = `<strong>${sender === 'user' ? 'Вы' : '🪞 Зеркало'}</strong><br>${text}<div class="time">${time}</div>`;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msgDiv;
    }

    // ==========================================
    // ГОЛОСОВОЙ ОТВЕТ (TTS)
    // ==========================================

    function speakText(text, callback) {
        if (!synthesis) {
            if (callback) callback();
            return;
        }
        if (currentUtterance) {
            synthesis.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        utterance.onend = () => {
            currentUtterance = null;
            if (callback) callback();
        };
        utterance.onerror = () => {
            currentUtterance = null;
            if (callback) callback();
        };
        currentUtterance = utterance;
        synthesis.speak(utterance);
    }

    // ==========================================
    // РАСПОЗНАВАНИЕ РЕЧИ (Web Speech API)
    // ==========================================

    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('❌ Ваш браузер не поддерживает голосовой ввод. Используйте текстовое поле.', 'assistant');
            return false;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isListening = true;
            startBtn.disabled = true;
            stopBtn.classList.remove('hidden');
            setStatus('🎤 Слушаю...', 'yellow');
            addMessage('🎤 Я слушаю вас...', 'assistant');
        };

        recognition.onerror = (event) => {
            console.error('Ошибка распознавания:', event.error);
            if (event.error === 'not-allowed') {
                addMessage('❌ Доступ к микрофону запрещён. Разрешите доступ в браузере.', 'assistant');
            } else if (event.error === 'no-speech') {
                addMessage('🔇 Я не услышал речи. Попробуйте ещё раз.', 'assistant');
            } else {
                addMessage(`⚠️ Ошибка: ${event.error}`, 'assistant');
            }
            stopListening();
        };

        recognition.onend = () => {
            if (isListening) {
                // Если слушали и закончили — перезапускаем
                try {
                    recognition.start();
                } catch (e) {}
            } else {
                stopListening();
            }
        };

        recognition.onresult = (event) => {
            let finalText = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalText += transcript;
                }
            }
            if (finalText) {
                handleUserInput(finalText);
            }
        };

        return true;
    }

    // ==========================================
    // УПРАВЛЕНИЕ ЗАПИСЬЮ
    // ==========================================

    function startListening() {
        if (!recognition) {
            const ok = initRecognition();
            if (!ok) return;
        }
        try {
            recognition.start();
        } catch (e) {
            if (e.message.includes('already started')) {
                // Уже запущено
            } else {
                console.error('Ошибка запуска:', e);
                addMessage('⚠️ Не удалось запустить микрофон. Попробуйте снова.', 'assistant');
            }
        }
    }

    function stopListening() {
        isListening = false;
        if (recognition) {
            try {
                recognition.stop();
            } catch (e) {}
        }
        startBtn.disabled = false;
        stopBtn.classList.add('hidden');
        setStatus('🟢 Готов', 'green');
        addMessage('⏹ Запись остановлена.', 'assistant');
    }

    // ==========================================
    // ОБРАБОТКА ВВОДА
    // ==========================================

    function handleUserInput(text) {
        if (!text || text.trim() === '') return;
        addMessage(text, 'user');
        processDialog(text);
    }

    // ==========================================
    // ДИАЛОГ (ПРОСТОЙ ОТВЕТ)
    // ==========================================

    function processDialog(text) {
        const lower = text.toLowerCase().trim();

        if (lower.includes('привет') || lower.includes('салям')) {
            const response = 'Ассаляму алейкум! Я рад видеть тебя. Как я могу помочь?';
            addMessage(response, 'assistant');
            speakText(response);
            return;
        }

        if (lower.includes('имя') || lower.includes('зовут')) {
            const response = 'Меня зовут Зеркало. Я создан, чтобы помогать людям.';
            addMessage(response, 'assistant');
            speakText(response);
            return;
        }

        if (lower.includes('работа') || lower.includes('найти')) {
            const response = 'Я могу помочь найти работу. Расскажи, какая у тебя профессия.';
            addMessage(response, 'assistant');
            speakText(response);
            return;
        }

        if (lower.includes('оплата') || lower.includes('qr')) {
            const response = 'Я могу сгенерировать QR-код для оплаты. Скажи сумму.';
            addMessage(response, 'assistant');
            speakText(response);
            showQR(1000, 'Оплата по запросу');
            return;
        }

        if (lower.includes('спасибо')) {
            const response = 'Обращайся в любое время. Я всегда рядом.';
            addMessage(response, 'assistant');
            speakText(response);
            return;
        }

        // Общий ответ
        const response = 'Я понял. Я продолжаю слушать. Если нужно — я могу помочь с работой, оплатой или поиском. Что тебе нужно?';
        addMessage(response, 'assistant');
        speakText(response);
    }

    // ==========================================
    // QR-КОД
    // ==========================================

    function showQR(amount, description) {
        const qrContainer = document.getElementById('qrContainer');
        const qrImage = document.getElementById('qrImage');
        const qrInfo = document.getElementById('qrInfo');
        qrContainer.classList.remove('hidden');
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Оплата%20${amount}%20тг%20${description}`;
        qrImage.src = qrApiUrl;
        qrInfo.textContent = `💳 Оплата: ${amount} ₸ | ${description}`;
        addMessage(`💳 QR-код для оплаты ${amount} ₸ сгенерирован.`, 'assistant');
    }

    // ==========================================
    // ТЕСТ МИКРОФОНА
    // ==========================================

    testBtn.addEventListener('click', function() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            addMessage('❌ Ваш браузер не поддерживает микрофон.', 'assistant');
            return;
        }
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(() => {
                addMessage('✅ Микрофон работает! Нажмите «🎤 Говорить» для записи.', 'assistant');
                setStatus('🟢 Микрофон ОК', 'green');
            })
            .catch((err) => {
                console.error('Ошибка доступа к микрофону:', err);
                addMessage('❌ Не удалось получить доступ к микрофону. Разрешите доступ в браузере.', 'assistant');
                setStatus('🔴 Микрофон НЕТ', 'red');
            });
    });

    // ==========================================
    // КНОПКИ ЗАПУСКА / ОСТАНОВКИ
    // ==========================================

    startBtn.addEventListener('click', function() {
        // Проверяем доступ к микрофону
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            addMessage('❌ Ваш браузер не поддерживает микрофон. Используйте текстовое поле.', 'assistant');
            return;
        }
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(() => {
                startListening();
            })
            .catch((err) => {
                console.error('Ошибка доступа к микрофону:', err);
                addMessage('❌ Не удалось получить доступ к микрофону. Разрешите доступ в браузере.', 'assistant');
            });
    });

    stopBtn.addEventListener('click', function() {
        stopListening();
    });

    // ==========================================
    // ТЕКСТОВЫЙ ВВОД
    // ==========================================

    sendBtn.addEventListener('click', function() {
        const text = textInput.value.trim();
        if (text) {
            handleUserInput(text);
            textInput.value = '';
        }
    });

    textInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ
    // ==========================================

    // Обновляем время приветствия
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    const welcomeTime = document.getElementById('welcomeTime');
    if (welcomeTime) welcomeTime.textContent = timeStr;

    // Инициализируем распознавание (без автозапуска)
    initRecognition();

    // Приветствие при загрузке
    setTimeout(() => {
        addMessage('🪞 Я готов слушать. Нажмите «🎤 Говорить» или напишите текст.', 'assistant');
    }, 1000);

    console.log('🪞 Зеркало загружено');
    console.log('📱 Голосовой ввод готов');
</script>
</body>
</html>
