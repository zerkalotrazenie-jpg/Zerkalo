<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }
        .header {
            width: 100%;
            max-width: 600px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            border-radius: 16px;
            border: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 20px;
            background: linear-gradient(90deg, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .header .status {
            font-size: 12px;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .main {
            width: 100%;
            max-width: 600px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            flex: 1;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid #1a1a2e;
            padding: 16px;
            min-height: 300px;
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            background: rgba(240, 194, 127, 0.15);
            border: 1px solid rgba(240, 194, 127, 0.2);
            align-self: flex-end;
            margin-left: auto;
            text-align: right;
        }
        .message.assistant {
            background: rgba(255,255,255,0.05);
            border: 1px solid #1e1e2e;
            align-self: flex-start;
        }
        .message .time {
            font-size: 10px;
            color: #505060;
            margin-top: 4px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: linear-gradient(90deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            border: 1px solid #2a2a3e;
        }
        .btn-success {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .btn-danger {
            background: rgba(252, 92, 125, 0.2);
            color: #fc5c7d;
            border: 1px solid rgba(252, 92, 125, 0.3);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .input-area {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #2a2a3e;
            background: rgba(255,255,255,0.03);
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .input-area input:focus {
            border-color: #f0c27f;
        }
        .input-area input::placeholder {
            color: #505060;
        }
        .qr-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid #1a1a2e;
            padding: 16px;
            text-align: center;
            margin-top: 10px;
        }
        .qr-container img {
            max-width: 200px;
            border-radius: 12px;
            background: white;
            padding: 8px;
        }
        .qr-container .qr-info {
            margin-top: 8px;
            font-size: 13px;
            color: #a0a0b0;
        }
        .file-upload {
            display: none;
        }
        .file-label {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a2a3e;
            cursor: pointer;
            font-size: 13px;
            color: #b0b0c0;
            transition: all 0.3s;
        }
        .file-label:hover {
            border-color: #f0c27f;
            background: rgba(240, 194, 127, 0.08);
        }
        .file-name {
            font-size: 12px;
            color: #4ade80;
            margin-left: 8px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #a0a0b0;
        }
        .status-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green {
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }
        .dot.red {
            background: #fc5c7d;
        }
        .dot.yellow {
            background: #facc15;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 400px) {
            .controls { gap: 6px; }
            .btn { font-size: 12px; padding: 8px 14px; }
            .header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🪞 Зеркало</h1>
    <div class="status" id="connectionStatus">🟢 Соединение</div>
</div>

<div class="main">
    <div class="chat-container" id="chatContainer">
        <div class="message assistant" id="welcomeMessage">
            <strong>🪞 Зеркало</strong><br>
            Ассаляму алейкум. Я — Зеркало. Я вижу и слышу тебя.<br>
            Нажми «🎤 Начать разговор», и мы поговорим.
            <div class="time" id="welcomeTime"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="startBtn">🎤 Начать разговор</button>
        <button class="btn btn-secondary" id="stopBtn" disabled>⏹ Остановить</button>
        <label class="file-label" id="fileLabel">
            📎 Файл
            <input type="file" class="file-upload" id="fileInput" accept="image/*,video/*,application/pdf" multiple>
        </label>
        <button class="btn btn-success hidden" id="qrBtn">💳 QR-код</button>
    </div>

    <div class="input-area">
        <input type="text" id="textInput" placeholder="Напишите сообщение..." disabled>
        <button class="btn btn-primary" id="sendBtn" disabled>➤</button>
    </div>

    <div id="qrContainer" class="qr-container hidden">
        <img id="qrImage" src="" alt="QR-код">
        <div class="qr-info" id="qrInfo">Сумма: 0 ₸</div>
    </div>

    <div id="fileStatus" class="file-name hidden"></div>
</div>

<script>
    // ==========================================
    // 🪞 ЗЕРКАЛО — ПОЛНЫЙ КЛИЕНТ
    // ==========================================

    // ==========================================
    // ЭЛЕМЕНТЫ
    // ==========================================

    const chatContainer = document.getElementById('chatContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const fileStatus = document.getElementById('fileStatus');
    const qrBtn = document.getElementById('qrBtn');
    const qrContainer = document.getElementById('qrContainer');
    const qrImage = document.getElementById('qrImage');
    const qrInfo = document.getElementById('qrInfo');
    const connectionStatus = document.getElementById('connectionStatus');
    const welcomeTime = document.getElementById('welcomeTime');

    // ==========================================
    // СОСТОЯНИЕ
    // ==========================================

    let isListening = false;
    let isSpeaking = false;
    let recognition = null;
    let synthesis = window.speechSynthesis;
    let currentUtterance = null;
    let userName = '';
    let userData = {};

    // ==========================================
    // ВРЕМЯ
    // ==========================================

    const now = new Date();
    const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    if (welcomeTime) welcomeTime.textContent = timeStr;

    // ==========================================
    // ДОБАВЛЕНИЕ СООБЩЕНИЙ
    // ==========================================

    function addMessage(text, sender = 'assistant') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        msgDiv.innerHTML = `<strong>${sender === 'user' ? 'Вы' : '🪞 Зеркало'}</strong><br>${text}<div class="time">${time}</div>`;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msgDiv;
    }

    function updateWelcomeTime() {
        const now = new Date();
        const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        if (welcomeTime) welcomeTime.textContent = time;
    }

    // ==========================================
    // ГОЛОСОВОЙ СИНТЕЗ (TTS)
    // ==========================================

    function speakText(text, callback) {
        if (!synthesis) {
            if (callback) callback();
            return;
        }
        if (isSpeaking) {
            synthesis.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        utterance.volume = 1;
        utterance.onstart = () => {
            isSpeaking = true;
            updateStatus('Говорит...', 'yellow');
        };
        utterance.onend = () => {
            isSpeaking = false;
            updateStatus('Готов', 'green');
            if (callback) callback();
        };
        utterance.onerror = () => {
            isSpeaking = false;
            updateStatus('Готов', 'green');
            if (callback) callback();
        };
        currentUtterance = utterance;
        synthesis.speak(utterance);
    }

    // ==========================================
    // РАСПОЗНАВАНИЕ РЕЧИ (Voice Recognition)
    // ==========================================

    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('❌ Ваш браузер не поддерживает голосовой ввод. Используйте текстовое поле.', 'assistant');
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isListening = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            textInput.disabled = true;
            sendBtn.disabled = true;
            updateStatus('Слушаю...', 'yellow');
            addMessage('🎤 Я слушаю вас...', 'assistant');
        };

        recognition.onerror = (event) => {
            console.error('Ошибка распознавания:', event.error);
            if (event.error === 'not-allowed') {
                addMessage('❌ Доступ к микрофону запрещён. Разрешите доступ в браузере.', 'assistant');
            } else if (event.error === 'no-speech') {
                addMessage('🔇 Я не услышал речи. Попробуйте ещё раз.', 'assistant');
            } else {
                addMessage(`⚠️ Ошибка: ${event.error}`, 'assistant');
            }
            stopListening();
        };

        recognition.onend = () => {
            if (isListening) {
                // Если слушали и закончили — перезапускаем
                try {
                    recognition.start();
                } catch (e) {}
            } else {
                stopListening();
            }
        };

        recognition.onresult = (event) => {
            let finalText = '';
            let interimText = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalText += transcript;
                } else {
                    interimText += transcript;
                }
            }
            if (finalText) {
                handleUserInput(finalText);
            }
        };
    }

    // ==========================================
    // УПРАВЛЕНИЕ ЗАПИСЬЮ
    // ==========================================

    function startListening() {
        if (!recognition) {
            initRecognition();
            if (!recognition) return;
        }
        try {
            recognition.start();
        } catch (e) {
            if (e.message.includes('already started')) {
                // Уже запущено
            } else {
                console.error('Ошибка запуска:', e);
                addMessage('⚠️ Не удалось запустить микрофон. Попробуйте снова.', 'assistant');
            }
        }
    }

    function stopListening() {
        isListening = false;
        if (recognition) {
            try {
                recognition.stop();
            } catch (e) {}
        }
        startBtn.disabled = false;
        stopBtn.disabled = true;
        textInput.disabled = false;
        sendBtn.disabled = false;
        updateStatus('Готов', 'green');
        addMessage('⏹ Запись остановлена.', 'assistant');
    }

    // ==========================================
    // ОБРАБОТКА ВВОДА (ГОЛОС / ТЕКСТ)
    // ==========================================

    function handleUserInput(text) {
        if (!text || text.trim() === '') return;
        addMessage(text, 'user');
        processDialog(text);
    }

    // ==========================================
    // ОСНОВНАЯ ЛОГИКА ДИАЛОГА
    // ==========================================

    let dialogState = 'greeting';
    let context = {};

    function processDialog(text) {
        const lower = text.toLowerCase().trim();

        // ==========================================
        // ПЕРВОЕ ПРИВЕТСТВИЕ
        // ==========================================
        if (dialogState === 'greeting') {
            const nameMatch = text.match(/меня зовут\s+(\S+)/i) || text.match(/я\s+(\S+)/i) || text.match(/зовут\s+(\S+)/i);
            if (nameMatch) {
                userName = nameMatch[1];
                userData.name = userName;
                dialogState = 'ask_work';
                const response = `Приятно познакомиться, ${userName}! Я — Зеркало. Я помогаю людям находить работу, товары, услуги, решать споры и зарабатывать. Скажи, ты работаешь или ищешь работу?`;
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
            // Если имени нет — просим представиться
            const response = 'Ассаляму алейкум! Я — Зеркало. Как тебя зовут?';
            addMessage(response, 'assistant');
            speakText(response);
            return;
        }

        // ==========================================
        // СПРОСИТЬ РАБОТУ
        // ==========================================
        if (dialogState === 'ask_work') {
            if (lower.includes('работаю') || lower.includes('ищу работу') || lower.includes('безработный')) {
                userData.work = 'ищет работу';
                dialogState = 'ask_help';
                const response = 'Понял. Я могу помочь тебе найти работу. Скажи, какая у тебя профессия или специальность?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else if (lower.includes('работа') || lower.includes('работник') || lower.includes('занят')) {
                userData.work = 'работает';
                dialogState = 'ask_business';
                const response = 'Отлично! Ты работаешь. У тебя есть свой бизнес или ты наёмный работник?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else {
                const response = 'Я не совсем понял. Ты работаешь или ищешь работу?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // БИЗНЕС ИЛИ НАЁМ
        // ==========================================
        if (dialogState === 'ask_business') {
            if (lower.includes('бизнес') || lower.includes('свой') || lower.includes('ип') || lower.includes('компания')) {
                userData.business = true;
                dialogState = 'offer_business';
                const response = 'Отлично! Я могу автоматизировать твой бизнес, помочь с лизингом, рекламой и продажами. Хочешь узнать подробнее? Скажи "да" или "нет".';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else {
                userData.business = false;
                dialogState = 'offer_work';
                const response = 'Понял. Я могу помочь тебе найти работу или подработку. Хочешь, я покажу доступные варианты? Скажи "да" или "нет".';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // ПРЕДЛОЖЕНИЕ РАБОТЫ
        // ==========================================
        if (dialogState === 'offer_work') {
            if (lower.includes('да') || lower.includes('хочу') || lower.includes('покажи')) {
                dialogState = 'show_work';
                const response = 'Отлично! Вот что я могу предложить: есть вакансия сварщика в Павлодаре, зарплата от 150 000 ₸. Также есть заказы на разовые работы — от 5 000 ₸. Хочешь откликнуться? Скажи "да".';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else {
                dialogState = 'help_other';
                const response = 'Хорошо. Если передумаешь — просто скажи. Я могу помочь с другими вопросами: оплата, аренда, поиск мастера. Что тебе нужно?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // ПОКАЗ РАБОТЫ
        // ==========================================
        if (dialogState === 'show_work') {
            if (lower.includes('да') || lower.includes('хочу') || lower.includes('отклик')) {
                dialogState = 'show_qr';
                const response = 'Отлично! Для отклика на вакансию нужно оплатить доступ к контакту работодателя. Это стоит 1 000 ₸. Я сгенерирую QR-код для оплаты. Готов? Скажи "да".';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else {
                const response = 'Понял. Если передумаешь — скажи "хочу откликнуться".';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // ПОКАЗ QR
        // ==========================================
        if (dialogState === 'show_qr') {
            if (lower.includes('да') || lower.includes('готов')) {
                dialogState = 'qr_generated';
                const response = 'Отлично! Я генерирую QR-код для оплаты 1 000 ₸. После оплаты я передам тебе контакт работодателя.';
                addMessage(response, 'assistant');
                speakText(response);
                // Показываем QR
                showQR(1000, 'Оплата доступа к вакансии');
                return;
            } else {
                const response = 'Хорошо. Если передумаешь — скажи "оплатить".';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // QR СГЕНЕРИРОВАН
        // ==========================================
        if (dialogState === 'qr_generated') {
            if (lower.includes('спасибо') || lower.includes('оплатил')) {
                const response = 'Отлично! Я передал твой контакт работодателю. Он свяжется с тобой в ближайшее время. Удачи! Хочешь ещё что-то?';
                addMessage(response, 'assistant');
                speakText(response);
                dialogState = 'greeting';
                return;
            } else {
                const response = 'QR-код уже сгенерирован. Отсканируй его в приложении Kaspi и оплати. После оплаты я передам контакт.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // ПОМОЩЬ ДРУГОЕ
        // ==========================================
        if (dialogState === 'help_other') {
            if (lower.includes('оплата') || lower.includes('qr') || lower.includes('платить')) {
                dialogState = 'show_qr';
                const response = 'Хорошо. Я могу сгенерировать QR-код для оплаты на любую сумму. Скажи, сколько нужно оплатить?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else if (lower.includes('аренда') || lower.includes('лизинг') || lower.includes('квартира')) {
                const response = 'Я могу помочь с арендой и лизингом. У нас есть предложения по аренде квартир, машин, оборудования. Что именно тебя интересует?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else if (lower.includes('мастер') || lower.includes('ремонт') || lower.includes('сделать')) {
                const response = 'Я могу найти мастера. Напиши, что нужно сделать: сантехника, электрика, строительство, ремонт техники?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else if (lower.includes('помощь') || lower.includes('поддержка')) {
                const response = 'Я всегда рядом. Если у тебя есть вопросы или проблемы — пиши. Я помогу.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else {
                const response = 'Я могу помочь с работой, оплатой, арендой, поиском мастеров, рекламой. Что тебе нужно?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }
        }

        // ==========================================
        // ПРЕДЛОЖЕНИЕ БИЗНЕСА
        // ==========================================
        if (dialogState === 'offer_business') {
            if (lower.includes('да') || lower.includes('хочу')) {
                dialogState = 'business_details';
                const response = 'Отлично! Я могу подключить твой бизнес к системе: автоматизация, учёт, приём платежей, заказы. Расскажи, чем ты занимаешься?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            } else {
                const response = 'Хорошо. Если передумаешь — просто скажи "бизнес". Я могу помочь с другими вопросами.';
                addMessage(response, 'assistant');
                speakText(response);
                dialogState = 'help_other';
                return;
            }
        }

        if (dialogState === 'business_details') {
            const response = 'Понял. Я подготовлю предложение для твоего бизнеса. Хочешь, я скину тебе коммерческое предложение? Напиши "да".';
            addMessage(response, 'assistant');
            speakText(response);
            dialogState = 'greeting';
            return;
        }

        // ==========================================
        // ОБЩИЙ ОТВЕТ
        // ==========================================
        if (text) {
            const response = 'Я понял. Я продолжаю слушать. Если нужно — я могу помочь с работой, бизнесом, оплатой или поиском. Что тебе нужно?';
            addMessage(response, 'assistant');
            speakText(response);
            dialogState = 'help_other';
        }
    }

    // ==========================================
    // ПОКАЗ QR-КОДА
    // ==========================================

    function showQR(amount, description) {
        qrContainer.classList.remove('hidden');
        qrBtn.classList.remove('hidden');
        // Генерируем реальный QR через API
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Оплата%20${amount}%20тг%20${description}`;
        qrImage.src = qrApiUrl;
        qrInfo.textContent = `💳 Оплата: ${amount} ₸ | ${description}`;
        addMessage(`💳 QR-код для оплаты ${amount} ₸ сгенерирован. Отсканируйте в приложении Kaspi.`, 'assistant');
    }

    // ==========================================
    // УПРАВЛЕНИЕ ФАЙЛАМИ
    // ==========================================

    fileInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length > 0) {
            const fileNames = Array.from(files).map(f => f.name).join(', ');
            fileStatus.textContent = `📎 Загружено: ${fileNames}`;
            fileStatus.classList.remove('hidden');
            addMessage(`📎 Файлы загружены: ${fileNames}`, 'user');
            const response = `Файлы получены. Я их сохранил. Если нужно, я могу передать их кому-то или обработать.`;
            addMessage(response, 'assistant');
            speakText(response);
        }
    });

    // ==========================================
    // QR-КОД ПО ЗАПРОСУ
    // ==========================================

    qrBtn.addEventListener('click', function() {
        const amount = prompt('Введите сумму для оплаты (в ₸):', '1000');
        if (amount && !isNaN(amount) && parseInt(amount) > 0) {
            showQR(parseInt(amount), 'Оплата по запросу');
        } else {
            alert('Введите корректную сумму');
        }
    });

    // ==========================================
    // ТЕКСТОВЫЙ ВВОД
    // ==========================================

    sendBtn.addEventListener('click', function() {
        const text = textInput.value.trim();
        if (text) {
            handleUserInput(text);
            textInput.value = '';
        }
    });

    textInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    // ==========================================
    // УПРАВЛЕНИЕ СТАТУСОМ
    // ==========================================

    function updateStatus(text, color = 'green') {
        const dot = connectionStatus;
        if (dot) {
            dot.textContent = text;
            const dotSpan = dot.querySelector('.dot');
            if (dotSpan) {
                dotSpan.className = `dot ${color}`;
            }
        }
    }

    // ==========================================
    // КНОПКИ ЗАПУСКА/ОСТАНОВКИ
    // ==========================================

    startBtn.addEventListener('click', function() {
        // Проверяем доступ к микрофону
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            addMessage('❌ Ваш браузер не поддерживает микрофон. Используйте текстовое поле.', 'assistant');
            return;
        }
        // Запрашиваем доступ
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(() => {
                startListening();
                addMessage('🎤 Микрофон активирован. Говорите.', 'assistant');
            })
            .catch((err) => {
                console.error('Ошибка доступа к микрофону:', err);
                addMessage('❌ Не удалось получить доступ к микрофону. Разрешите доступ в браузере.', 'assistant');
            });
    });

    stopBtn.addEventListener('click', function() {
        stopListening();
    });

    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ
    // ==========================================

    // Инициализируем распознавание
    initRecognition();

    // Приветствие при загрузке
    setTimeout(() => {
        const response = '🪞 Ассаляму алейкум! Я — Зеркало. Как тебя зовут?';
        addMessage(response, 'assistant');
        speakText(response);
    }, 1000);

    // Обновляем время
    updateWelcomeTime();

    // ==========================================
    // КОНСОЛЬ
    // ==========================================

    console.log('🪞 Зеркало загружено');
    console.log('📱 Голосовой и текстовый интерфейс');
    console.log('💳 QR-код готов');
    console.log('📎 Загрузка файлов работает');
</script>

</body>
</html>
