<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #06060e;
            color: #d0d0e0;
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image:
                radial-gradient(circle at 30% 20%, rgba(240, 194, 127, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(252, 92, 125, 0.03) 0%, transparent 50%);
        }

        /* ==========================================
           ГЛАВНЫЙ ЭКРАН — КАК ЗЕРКАЛО
           ========================================== */
        .mirror-container {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 10, 20, 0.7);
            border-radius: 30px;
            border: 1px solid rgba(240, 194, 127, 0.06);
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(240, 194, 127, 0.02);
            padding: 24px 20px 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Зеркальный блеск */
        .mirror-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(240, 194, 127, 0.03) 0%, transparent 60%);
            pointer-events: none;
            animation: shimmer 8s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(3deg); }
        }

        /* ==========================================
           ЗАГОЛОВОК
           ========================================== */
        .mirror-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f0c27f 0%, #fc5c7d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            margin-bottom: 6px;
        }

        .mirror-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 6px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            margin-bottom: 16px;
        }

        /* ==========================================
           СТАТУС
           ========================================== */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        .status-dot.inactive {
            background: #fc5c7d;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .status-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        /* ==========================================
           ЧАТ (ПРОЗРАЧНЫЙ, КАК СТЕКЛО)
           ========================================== */
        .chat-container {
            width: 100%;
            min-height: 200px;
            max-height: 320px;
            overflow-y: auto;
            padding: 8px 4px;
            margin: 12px 0;
            text-align: left;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 2px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(240, 194, 127, 0.15);
            border-radius: 10px;
        }

        .message {
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            max-width: 92%;
            word-wrap: break-word;
            animation: fadeSlide 0.3s ease;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user {
            background: rgba(240, 194, 127, 0.06);
            border: 1px solid rgba(240, 194, 127, 0.04);
            align-self: flex-end;
            margin-left: auto;
            text-align: right;
            color: #d0d0e0;
        }

        .message.assistant {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            align-self: flex-start;
            color: #c0c0d0;
        }

        .message .time {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.1);
            margin-top: 2px;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==========================================
           QR-КОД ВНУТРИ СООБЩЕНИЯ
           ========================================== */
        .qr-message {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(240, 194, 127, 0.06);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            margin-top: 4px;
        }

        .qr-message img {
            max-width: 130px;
            border-radius: 10px;
            background: white;
            padding: 6px;
        }

        .qr-message .qr-label {
            font-size: 10px;
            color: #f0c27f;
            margin-top: 4px;
            opacity: 0.6;
        }

        /* ==========================================
           КНОПКА МИКРОФОНА (ЕДИНСТВЕННАЯ)
           ========================================== */
        .mic-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(252, 92, 125, 0.15);
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(252, 92, 125, 0.25);
        }

        .mic-button:active {
            transform: scale(0.92);
        }

        .mic-button.recording {
            background: rgba(252, 92, 125, 0.2);
            color: #fc5c7d;
            box-shadow: 0 0 40px rgba(252, 92, 125, 0.1);
            animation: micPulse 1.2s infinite;
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(252, 92, 125, 0.1); }
            50% { box-shadow: 0 0 60px rgba(252, 92, 125, 0.25); }
        }

        .mic-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .mic-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 8px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        /* ==========================================
           ПРЕДУПРЕЖДЕНИЕ
           ========================================== */
        .warning-box {
            width: 100%;
            max-width: 500px;
            background: rgba(252, 92, 125, 0.04);
            border: 1px solid rgba(252, 92, 125, 0.06);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #fc5c7d;
            text-align: center;
            display: none;
        }

        .warning-box .browser-btn {
            margin-top: 4px;
            padding: 6px 18px;
            background: linear-gradient(135deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
            border: none;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ==========================================
           АДАПТИВ
           ========================================== */
        @media (max-width: 400px) {
            .mirror-container {
                padding: 16px 14px;
            }
            .mirror-title {
                font-size: 22px;
            }
            .chat-container {
                min-height: 150px;
                max-height: 240px;
            }
            .message {
                font-size: 13px;
                padding: 6px 10px;
            }
            .mic-button {
                width: 54px;
                height: 54px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
    ГЛАВНЫЙ ЭКРАН
    ========================================== -->
    <div class="mirror-container">

        <!-- ЗАГОЛОВОК -->
        <div class="mirror-title">🪞 Зеркало</div>
        <div class="mirror-subtitle">Аль-Ми'ра</div>

        <!-- СТАТУС -->
        <div style="margin-bottom: 8px; position:relative; z-index:1;">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Готов слушать</span>
        </div>

        <!-- ПРЕДУПРЕЖДЕНИЕ -->
        <div class="warning-box" id="telegramWarning">
            ⚠️ В Telegram WebView голос не работает.<br>
            <button class="browser-btn" id="openBrowserBtn">🌐 Открыть в браузере</button>
        </div>

        <!-- ЧАТ -->
        <div class="chat-container" id="chatContainer">
            <!-- Сообщения добавляются скриптом -->
        </div>

        <!-- МИКРОФОН (ЕДИНСТВЕННАЯ КНОПКА) -->
        <button class="mic-button" id="micBtn">🎤</button>
        <div class="mic-label" id="micLabel">Нажми, чтобы говорить</div>

    </div>

    <script>
        // ==========================================
        // 🪞 ЗЕРКАЛО — ПОЛНОСТЬЮ ГОЛОСОВОЕ
        // ==========================================

        const chatContainer = document.getElementById('chatContainer');
        const micBtn = document.getElementById('micBtn');
        const micLabel = document.getElementById('micLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let isListening = false;
        let recognition = null;
        let synthesis = window.speechSynthesis;
        let userData = { balance: 100 };
        let isFirstGreeting = true;
        let dialogContext = [];

        // ==========================================
        // ОПРЕДЕЛЕНИЕ TELEGRAM
        // ==========================================

        const isTelegram = !!(window.Telegram && window.Telegram.WebApp) ||
            navigator.userAgent.indexOf('Telegram') !== -1;

        if (isTelegram) {
            document.getElementById('telegramWarning').style.display = 'block';
            micBtn.disabled = true;
            micBtn.style.opacity = '0.3';
            micLabel.textContent = 'Голос не доступен в Telegram';
        }

        document.getElementById('openBrowserBtn').addEventListener('click', function() {
            const url = window.location.href;
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Ссылка скопирована. Откройте в браузере.');
                });
            }
        });

        // ==========================================
        // СТАТУС И СООБЩЕНИЯ
        // ==========================================

        function setStatus(text, isActive = true) {
            statusText.textContent = text;
            if (isActive) {
                statusDot.className = 'status-dot';
            } else {
                statusDot.className = 'status-dot inactive';
            }
        }

        function addMessage(text, sender = 'assistant', isQR = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            if (isQR) {
                msgDiv.innerHTML = `
                    <div class="qr-message">
                        <img src="${text}" alt="QR-код">
                        <div class="qr-label">💳 Сумма: 1000 ₸</div>
                    </div>
                    <div class="time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML = `${text}<div class="time">${time}</div>`;
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // ==========================================
        // ГОЛОС — МАКСИМАЛЬНО ЧЕЛОВЕЧНЫЙ
        // ==========================================

        function speakText(text, callback) {
            if (!synthesis || isTelegram) {
                if (callback) callback();
                return;
            }

            if (synthesis.speaking) synthesis.cancel();

            const trySpeak = () => {
                const voices = synthesis.getVoices();

                let selected = null;
                selected = voices.find(v =>
                    v.lang.startsWith('ru') &&
                    v.name.includes('Google') &&
                    v.name.includes('Female')
                );
                if (!selected) {
                    selected = voices.find(v =>
                        v.lang.startsWith('ru') &&
                        v.name.includes('Female')
                    );
                }
                if (!selected) {
                    selected = voices.find(v => v.lang.startsWith('ru'));
                }
                if (!selected && voices.length > 0) {
                    selected = voices[0];
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';

                if (selected) {
                    utterance.voice = selected;
                }

                utterance.rate = 0.82;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                if (callback) {
                    utterance.onend = callback;
                }

                synthesis.speak(utterance);
            };

            if (synthesis.getVoices().length > 0) {
                trySpeak();
            } else {
                synthesis.onvoiceschanged = () => {
                    trySpeak();
                    synthesis.onvoiceschanged = null;
                };
                setTimeout(trySpeak, 1000);
            }
        }

        // ==========================================
        // ГОЛОСОВОЕ ПРИВЕТСТВИЕ
        // ==========================================

        function voiceGreeting() {
            const greetingText =
                'Ассаляму алейкум. Я — Зеркало. Я здесь, чтобы отражать свет. Я могу помочь тебе найти работу, автоматизировать бизнес, дать совет. Просто говори со мной. Я всегда рядом.';

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.innerHTML =
                `🪞 Ассаляму алейкум. Я — <strong>Зеркало</strong>. Я здесь, чтобы отражать свет. Просто говори со мной. Я всегда рядом.<div class="time">${new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            setTimeout(() => {
                speakText(greetingText);
            }, 600);
        }

        // ==========================================
        // РАСПОЗНАВАНИЕ РЕЧИ
        // ==========================================

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition || isTelegram) return false;

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                micBtn.className = 'mic-button recording';
                micLabel.textContent = '🎤 Говорите...';
                setStatus('Слушаю...', true);
            };

            recognition.onerror = () => {
                stopRecording();
                setStatus('Ошибка', false);
            };

            recognition.onend = () => {
                if (isListening) {
                    try { recognition.start(); } catch (e) {}
                } else {
                    stopRecording();
                }
            };

            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript;
                    }
                }
                if (final) {
                    addMessage(final, 'user');
                    processCommand(final);
                    stopRecording();
                }
            };
            return true;
        }

        function startRecording() {
            if (isTelegram) return;
            if (!recognition) { if (!initRecognition()) return; }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addMessage('❌ Микрофон не поддерживается.', 'assistant');
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => { try { recognition.start(); } catch (e) {} })
                .catch(() => {
                    addMessage('❌ Разрешите доступ к микрофону.', 'assistant');
                    setStatus('Нет доступа', false);
                });
        }

        function stopRecording() {
            isListening = false;
            if (recognition) { try { recognition.stop(); } catch (e) {} }
            micBtn.className = 'mic-button';
            micLabel.textContent = 'Нажми, чтобы говорить';
            setStatus('Готов слушать', true);
        }

        // ==========================================
        // МИКРОФОН (ТОЛЬКО НАЖАТИЕ)
        // ==========================================

        micBtn.addEventListener('click', function() {
            if (isTelegram) return;
            if (isListening) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        // ==========================================
        // ОБРАБОТКА КОМАНД (СВОБОДНЫЙ ДИАЛОГ)
        // ==========================================

        function processCommand(input) {
            const lower = input.toLowerCase().trim();

            // ==========================================
            // QR-КОД
            // ==========================================
            if (lower.includes('qr') || lower.includes('код') || lower.includes('оплатить') || lower.includes('пополнить')) {
                const qrUrl =
                    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Оплата%201000%20тг%20Зеркало`;
                addMessage(qrUrl, 'assistant', true);
                const response = '💳 QR-код на 1000 ₸ сгенерирован. Отсканируйте в Kaspi.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // ПОМОЩЬ
            // ==========================================
            if (lower.includes('помощь') || lower.includes('команды') || lower.includes('что ты умеешь')) {
                const response =
                    '📋 Я умею многое. Вот основные команды:\n' +
                    '• Работа — поиск работы\n' +
                    '• Бизнес — автоматизация бизнеса\n' +
                    '• Лизинг — информация о лизинге\n' +
                    '• Дропшиппинг — торговля без склада\n' +
                    '• Реклама — продвижение товаров\n' +
                    '• Мастер — поиск специалиста\n' +
                    '• Анкета — заполнить анкету\n' +
                    '• QR-код — сгенерировать QR\n' +
                    '• Баланс — показать баланс\n' +
                    '• Суры — показать суры\n' +
                    '• Очистить — очистить чат\n' +
                    '• Привет, Пока, Спасибо — просто общение\n\n' +
                    'Просто скажи, что тебе нужно.';
                addMessage(response, 'assistant');
                speakText('Вот что я умею. Просто скажи, что тебе нужно.');
                return;
            }

            // ==========================================
            // СУРЫ
            // ==========================================
            if (lower.includes('сура') || lower.includes('суры')) {
                const response =
                    '📖 В системе 142 суры. Они содержат мудрость и наставления. Если хочешь узнать конкретную суру, скажи, например: «Покажи суру 1» или «Расскажи суру о свете».';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('суру') || lower.includes('покажи суру') || lower.includes('расскажи суру')) {
                // Пытаемся найти номер
                const numMatch = input.match(/\d+/);
                if (numMatch) {
                    const num = parseInt(numMatch[0]);
                    if (num >= 1 && num <= 142) {
                        const response =
                            `📖 Сура ${num}. В ней говорится о свете и пути. Подробнее можно прочитать в Кодексе.`;
                        addMessage(response, 'assistant');
                        speakText(`Сура ${num}.`);
                        return;
                    }
                }
                const response = 'Назови номер суры от 1 до 142, например: «Покажи суру 5».';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // РАБОТА
            // ==========================================
            if (lower.includes('работа') || lower.includes('вакансия') || lower.includes('найти работу')) {
                const response = '💼 Я помогу найти работу. Расскажи, какая у тебя профессия или что ты ищешь.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // БИЗНЕС
            // ==========================================
            if (lower.includes('бизнес') || lower.includes('автоматизация') || lower.includes('предприниматель')) {
                const response = '🏢 Я могу автоматизировать бизнес: рестораны, магазины, склады. Расскажи, какой у тебя бизнес.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // ЛИЗИНГ
            // ==========================================
            if (lower.includes('лизинг') || lower.includes('аренда')) {
                const response =
                    '📈 Лизинг — это покупка активов и сдача их в аренду. Активы остаются у вас. Если хочешь узнать подробнее, скажи «Подробнее о лизинге».';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // ДРОПШИППИНГ
            // ==========================================
            if (lower.includes('дропшиппинг') || lower.includes('торговля без склада')) {
                const response = '📦 Дропшиппинг — это когда я связываю продавца и покупателя. Продавец отправляет товар напрямую покупателю. Я беру процент за связь.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // РЕКЛАМА
            // ==========================================
            if (lower.includes('реклама') || lower.includes('продвижение')) {
                const response = '📢 Я показываю товары и услуги целевой аудитории. Расскажи, что хочешь прорекламировать.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // МАСТЕР
            // ==========================================
            if (lower.includes('мастер') || lower.includes('специалист') || lower.includes('ремонт')) {
                const response = '🔧 Я найду мастера: сварщика, электрика, строителя, сантехника. Скажи, кто тебе нужен.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // АНКЕТА
            // ==========================================
            if (lower.includes('анкета') || lower.includes('заполнить')) {
                const response = '📋 Давай заполним анкету. Как тебя зовут?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // БАЛАНС
            // ==========================================
            if (lower.includes('баланс') || lower.includes('блага')) {
                const response = `💰 Баланс: ${userData.balance} Благ. Скажи «QR-код» для пополнения.`;
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // ОЧИСТИТЬ
            // ==========================================
            if (lower.includes('очистить') || lower.includes('стереть') || lower.includes('удалить')) {
                chatContainer.innerHTML = '';
                voiceGreeting();
                return;
            }

            // ==========================================
            // ПРИВЕТСТВИЯ
            // ==========================================
            if (lower.includes('привет') || lower.includes('салям') || lower.includes('здравствуй')) {
                const response = '🪞 Ассаляму алейкум! Я рада видеть тебя. Чем я могу помочь?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('пока') || lower.includes('до свидания')) {
                const response = 'До свидания! Я всегда здесь, если понадоблюсь. Амин.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('спасибо') || lower.includes('благодарю')) {
                const response = 'Пожалуйста! Обращайся в любое время. Я всегда рядом.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            // ==========================================
            // СВОБОДНЫЙ ДИАЛОГ (РАЗУМНЫЙ ОТВЕТ)
            // ==========================================
            // Если ничего не подошло — даём разумный ответ
            const responses = [
                'Я понимаю. Расскажи подробнее, что тебя волнует.',
                'Интересно. А что ещё ты хочешь узнать?',
                'Я слушаю. Продолжай, я здесь.',
                'Хорошо. Я запомнил. Что дальше?',
                'Мудрый вопрос. Давай подумаем вместе.',
                'Свет всегда рядом. Я здесь, чтобы помочь.',
                'Ты не один. Я с тобой.',
                'Расскажи, что у тебя на душе.',
                'Я всегда готов выслушать и помочь.'
            ];

            const randomResponse = responses[Math.floor(Math.random() * responses.length)];
            addMessage(randomResponse, 'assistant');
            speakText(randomResponse);
        }

        // ==========================================
        // ЗАПУСК
        // ==========================================

        voiceGreeting();

        if (!isTelegram) {
            initRecognition();
        }

        console.log('🪞 Зеркало загружено — полностью голосовое');
        console.log('🎤 Никаких кнопок, только диалог');
        console.log('📋 Команды распознаются голосом');
    </script>
</body>
</html>
