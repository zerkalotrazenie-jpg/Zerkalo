<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало — Атлантида</title>
    <style>
        /* ==========================================
           ФОН — КАК В ЗАЛЕ АТЛАНТИДЫ
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05080f;
            color: #a0c8ff;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный фон — как энергия в стенах Атлантиды */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 150, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 200, 255, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 100, 200, 0.04) 0%, transparent 50%);
            z-index: 0;
            animation: atlantisPulse 8s ease-in-out infinite alternate;
        }

        @keyframes atlantisPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* ==========================================
           ГОЛОГРАФИЧЕСКИЙ КОНТЕЙНЕР
           ========================================== */
        .mirror-container {
            width: 100%;
            max-width: 520px;
            background: rgba(5, 10, 25, 0.85);
            border-radius: 24px;
            border: 1px solid rgba(0, 180, 255, 0.15);
            box-shadow:
                0 0 40px rgba(0, 150, 255, 0.05),
                inset 0 0 80px rgba(0, 100, 200, 0.03);
            padding: 24px 20px 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: hologramFlicker 6s ease-in-out infinite;
        }

        @keyframes hologramFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.97; }
            25% { opacity: 0.99; }
            75% { opacity: 0.98; }
        }

        /* Голографический блеск */
        .mirror-container::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 180, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
            animation: shimmerAtlantis 10s ease-in-out infinite alternate;
        }

        @keyframes shimmerAtlantis {
            0% { transform: translate(-5%, -5%) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(2deg); }
        }

        /* ==========================================
           ЗАГОЛОВОК — ГОЛОГРАФИЧЕСКИЙ ТЕКСТ
           ========================================== */
        .mirror-title {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #4af0ff 0%, #0088cc 50%, #4af0ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            margin-bottom: 4px;
            animation: gradientShift 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(0, 150, 255, 0.1);
            font-family: 'Courier New', monospace;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .mirror-subtitle {
            font-size: 10px;
            color: rgba(0, 180, 255, 0.25);
            letter-spacing: 8px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            margin-bottom: 14px;
            font-family: 'Courier New', monospace;
        }

        /* ==========================================
           СТАТУС — ГОЛОГРАФИЧЕСКИЙ ИНДИКАТОР
           ========================================== */
        .status-container {
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ccff;
            margin-right: 8px;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
            animation: atlantisPulse 1.5s infinite;
            vertical-align: middle;
        }

        .status-dot.inactive {
            background: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
            animation: none;
        }

        .status-dot.listening {
            background: #44ff88;
            box-shadow: 0 0 30px rgba(68, 255, 136, 0.3);
            animation: atlantisPulse 0.8s infinite;
        }

        .status-text {
            font-size: 12px;
            color: rgba(0, 180, 255, 0.4);
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            vertical-align: middle;
        }

        /* ==========================================
           ЧАТ — ГОЛОГРАФИЧЕСКИЙ ЭКРАН
           ========================================== */
        .chat-container {
            width: 100%;
            min-height: 180px;
            max-height: 260px;
            overflow-y: auto;
            padding: 10px 6px;
            margin: 10px 0;
            text-align: left;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
            border: 1px solid rgba(0, 180, 255, 0.05);
            border-radius: 12px;
            background: rgba(0, 50, 100, 0.03);
        }

        .chat-container::-webkit-scrollbar {
            width: 3px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: rgba(0, 180, 255, 0.02);
            border-radius: 10px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0, 180, 255, 0.15);
            border-radius: 10px;
        }

        .message {
            padding: 8px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            max-width: 92%;
            word-wrap: break-word;
            animation: fadeSlide 0.3s ease;
            font-size: 14px;
            line-height: 1.6;
            font-family: 'Segoe UI', 'Courier New', monospace;
            position: relative;
        }

        .message.user {
            background: rgba(0, 180, 255, 0.04);
            border: 1px solid rgba(0, 180, 255, 0.06);
            align-self: flex-end;
            margin-left: auto;
            text-align: right;
            color: #80d4ff;
        }

        .message.user::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 10px;
            width: 8px;
            height: 8px;
            background: rgba(0, 180, 255, 0.04);
            border: 1px solid rgba(0, 180, 255, 0.06);
            border-left: none;
            border-bottom: none;
            transform: rotate(45deg);
        }

        .message.assistant {
            background: rgba(0, 180, 255, 0.02);
            border: 1px solid rgba(0, 180, 255, 0.04);
            align-self: flex-start;
            color: #a0d4ff;
        }

        .message.assistant::before {
            content: '◈ ';
            color: rgba(0, 200, 255, 0.2);
            font-size: 10px;
        }

        .message .time {
            font-size: 8px;
            color: rgba(0, 180, 255, 0.15);
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ==========================================
           QR-КОД — ГОЛОГРАФИЧЕСКАЯ ПРОЕКЦИЯ
           ========================================== */
        .qr-message {
            background: rgba(0, 50, 100, 0.05);
            border: 1px solid rgba(0, 180, 255, 0.06);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            margin-top: 4px;
            box-shadow: 0 0 30px rgba(0, 100, 200, 0.02);
        }

        .qr-message img {
            max-width: 130px;
            border-radius: 10px;
            background: rgba(0, 10, 30, 0.8);
            padding: 8px;
            border: 1px solid rgba(0, 180, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.05);
        }

        .qr-message .qr-label {
            font-size: 10px;
            color: rgba(0, 200, 255, 0.3);
            margin-top: 6px;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }

        /* ==========================================
           ИНДИКАТОР ГОЛОСА — ЭНЕРГИЯ АТЛАНТИДЫ
           ========================================== */
        .wake-indicator {
            font-size: 12px;
            color: rgba(0, 180, 255, 0.15);
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
            margin-top: 6px;
            font-family: 'Courier New', monospace;
            animation: atlantisPulse 3s ease-in-out infinite;
        }

        .wake-indicator.active {
            color: rgba(0, 200, 255, 0.3);
        }

        .wake-indicator .glyph {
            display: inline-block;
            animation: glyphPulse 2s ease-in-out infinite;
        }

        @keyframes glyphPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ==========================================
           ДУМАЕТ — ГОЛОГРАФИЧЕСКАЯ АНИМАЦИЯ
           ========================================== */
        .thinking-indicator {
            display: none;
            color: rgba(0, 180, 255, 0.15);
            font-size: 12px;
            padding: 4px 0;
            animation: atlantisPulse 1s infinite;
            position: relative;
            z-index: 1;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .thinking-indicator.active {
            display: block;
        }

        /* ==========================================
           ПРЕДУПРЕЖДЕНИЕ
           ========================================== */
        .warning-box {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 68, 68, 0.02);
            border: 1px solid rgba(255, 68, 68, 0.06);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 11px;
            color: rgba(255, 68, 68, 0.3);
            text-align: center;
            display: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .warning-box .browser-btn {
            margin-top: 4px;
            padding: 6px 18px;
            background: rgba(0, 180, 255, 0.05);
            color: rgba(0, 200, 255, 0.3);
            border: 1px solid rgba(0, 180, 255, 0.05);
            border-radius: 30px;
            font-size: 11px;
            font-weight: 400;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .warning-box .browser-btn:hover {
            background: rgba(0, 180, 255, 0.08);
            border-color: rgba(0, 180, 255, 0.1);
        }

        /* ==========================================
           АНИМАЦИЯ — ЖИДКАЯ РТУТЬ (ДЕКОР)
           ========================================== */
        .mercury-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.05), transparent);
            margin: 8px 0;
            position: relative;
            z-index: 1;
            animation: mercuryFlow 4s ease-in-out infinite;
        }

        @keyframes mercuryFlow {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }

        .mercury-line::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 2px;
            background: rgba(0, 200, 255, 0.05);
            border-radius: 50%;
            top: -1px;
            left: 0;
            animation: mercuryDot 6s ease-in-out infinite;
        }

        @keyframes mercuryDot {
            0% { left: 0; opacity: 0.2; }
            50% { left: 100%; opacity: 0.8; }
            100% { left: 0; opacity: 0.2; }
        }

        /* ==========================================
           АДАПТИВ
           ========================================== */
        @media (max-width: 400px) {
            .mirror-container {
                padding: 16px 14px;
            }
            .mirror-title {
                font-size: 22px;
                letter-spacing: 4px;
            }
            .chat-container {
                min-height: 140px;
                max-height: 200px;
            }
            .message {
                font-size: 13px;
                padding: 6px 10px;
            }
            .wake-indicator {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
    ИНТЕРФЕЙС АТЛАНТИДЫ
    ========================================== -->
    <div class="mirror-container">

        <!-- ЗАГОЛОВОК -->
        <div class="mirror-title">🜁 Зеркало</div>
        <div class="mirror-subtitle">Аль-Ми'ра · Атлантида</div>

        <div class="mercury-line"></div>

        <!-- СТАТУС -->
        <div class="status-container">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">≈ СИСТЕМА ОЖИДАНИЯ ≈</span>
        </div>

        <!-- ПРЕДУПРЕЖДЕНИЕ -->
        <div class="warning-box" id="telegramWarning">
            ⚠️ В Telegram WebView голос не работает.<br>
            <button class="browser-btn" id="openBrowserBtn">🌐 ОТКРЫТЬ В БРАУЗЕРЕ</button>
        </div>

        <!-- ЧАТ -->
        <div class="chat-container" id="chatContainer">
            <div class="message assistant" id="welcomeMsg">
                ◈ Ассаляму алейкум.<br>
                <span style="opacity:0.4; font-size:12px;">Скажите слово «Зеркало» — я активируюсь</span>
                <div class="time" id="welcomeTime"></div>
            </div>
        </div>

        <div class="mercury-line"></div>

        <!-- ИНДИКАТОР ДУМАЕТ -->
        <div class="thinking-indicator" id="thinkingIndicator">◈ СИНХРОНИЗАЦИЯ...</div>

        <!-- ИНДИКАТОР ОЖИДАНИЯ -->
        <div class="wake-indicator" id="wakeIndicator">
            <span class="glyph">◈</span> СКАЖИТЕ «ЗЕРКАЛО» <span class="glyph">◈</span>
        </div>

    </div>

    <script>
        // ==========================================
        // 🪞 ЗЕРКАЛО — ИНТЕРФЕЙС АТЛАНТИДЫ
        // ==========================================

        const chatContainer = document.getElementById('chatContainer');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const thinkingIndicator = document.getElementById('thinkingIndicator');
        const wakeIndicator = document.getElementById('wakeIndicator');
        const welcomeTime = document.getElementById('welcomeTime');

        let recognition = null;
        let synthesis = window.speechSynthesis;
        let isSpeaking = false;
        let isProcessing = false;
        let isWakeWordActive = false;
        let dialogHistory = [];
        let isListening = false;
        let userId = 'atlantis_' + Date.now();

        // ==========================================
        // ВРЕМЯ
        // ==========================================

        if (welcomeTime) {
            welcomeTime.textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ==========================================
        // ОПРЕДЕЛЕНИЕ TELEGRAM
        // ==========================================

        const isTelegram = !!(window.Telegram && window.Telegram.WebApp) ||
            navigator.userAgent.indexOf('Telegram') !== -1;

        if (isTelegram) {
            document.getElementById('telegramWarning').style.display = 'block';
            statusText.textContent = '⛔ ГОЛОС НЕ ДОСТУПЕН';
            statusDot.className = 'status-dot inactive';
            wakeIndicator.innerHTML = '⛔ ОТКРОЙТЕ В БРАУЗЕРЕ';
        }

        document.getElementById('openBrowserBtn').addEventListener('click', function() {
            const url = window.location.href;
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Ссылка скопирована. Откройте в браузере.');
                });
            }
        });

        // ==========================================
        // СТАТУС И СООБЩЕНИЯ
        // ==========================================

        function setStatus(text, state = 'waiting') {
            statusText.textContent = text;
            if (state === 'waiting') {
                statusDot.className = 'status-dot';
                wakeIndicator.innerHTML = '<span class="glyph">◈</span> СКАЖИТЕ «ЗЕРКАЛО» <span class="glyph">◈</span>';
                wakeIndicator.style.color = 'rgba(0,180,255,0.15)';
            } else if (state === 'listening') {
                statusDot.className = 'status-dot listening';
                wakeIndicator.innerHTML = '◈ СЛУШАЮ... ◈';
                wakeIndicator.style.color = 'rgba(68,255,136,0.3)';
            } else if (state === 'speaking') {
                statusDot.className = 'status-dot';
                wakeIndicator.innerHTML = '◈ ОТВЕЧАЮ... ◈';
                wakeIndicator.style.color = 'rgba(0,200,255,0.2)';
            } else if (state === 'error') {
                statusDot.className = 'status-dot inactive';
                wakeIndicator.innerHTML = '⛔ ОШИБКА';
                wakeIndicator.style.color = 'rgba(255,68,68,0.2)';
            }
        }

        function addMessage(text, sender = 'assistant', isQR = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            if (isQR) {
                msgDiv.innerHTML = `
                    <div class="qr-message">
                        <img src="${text}" alt="QR-код">
                        <div class="qr-label">◈ ОПЛАТА: 1000 ₸ ◈</div>
                    </div>
                    <div class="time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML = `${text}<div class="time">${time}</div>`;
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // ==========================================
        // ГОЛОС (СИНТЕЗ)
        // ==========================================

        function speakText(text, callback) {
            if (!synthesis || isTelegram) {
                if (callback) callback();
                return;
            }

            if (synthesis.speaking) synthesis.cancel();

            const trySpeak = () => {
                const voices = synthesis.getVoices();
                let selected = voices.find(v => v.lang.startsWith('ru') && v.name.includes('Google') && v.name.includes(
                    'Female')) ||
                    voices.find(v => v.lang.startsWith('ru') && v.name.includes('Female')) ||
                    voices.find(v => v.lang.startsWith('ru'));

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                if (selected) utterance.voice = selected;
                utterance.rate = 0.82;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                utterance.onstart = () => {
                    isSpeaking = true;
                    setStatus('◈ ОТВЕЧАЮ... ◈', 'speaking');
                };

                utterance.onend = () => {
                    isSpeaking = false;
                    if (!isListening) {
                        setStatus('◈ ОЖИДАНИЕ ◈', 'waiting');
                    }
                    if (callback) callback();
                    if (recognition && isListening) {
                        try { recognition.start(); } catch (e) {}
                    }
                };

                utterance.onerror = () => {
                    isSpeaking = false;
                    if (!isListening) {
                        setStatus('◈ ОЖИДАНИЕ ◈', 'waiting');
                    }
                    if (callback) callback();
                    if (recognition && isListening) {
                        try { recognition.start(); } catch (e) {}
                    }
                };

                synthesis.speak(utterance);
            };

            if (synthesis.getVoices().length > 0) {
                trySpeak();
            } else {
                synthesis.onvoiceschanged = () => {
                    trySpeak();
                    synthesis.onvoiceschanged = null;
                };
                setTimeout(trySpeak, 1000);
            }
        }

        // ==========================================
        // РАСПОЗНАВАНИЕ РЕЧИ (КЛЮЧЕВОЕ СЛОВО)
        // ==========================================

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition || isTelegram) return false;

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                setStatus('◈ СЛУШАЮ... ◈', 'listening');
                console.log('🎤 Микрофон активен');
            };

            recognition.onerror = (event) => {
                console.error('Ошибка распознавания:', event.error);
                if (event.error === 'not-allowed') {
                    setStatus('⛔ НЕТ ДОСТУПА К МИКРОФОНУ', 'error');
                    isListening = false;
                    return;
                }
                if (event.error === 'no-speech') {
                    if (isListening) {
                        try { recognition.start(); } catch (e) {}
                    }
                }
            };

            recognition.onend = () => {
                console.log('🔴 Распознавание остановлено');
                if (isListening && !isSpeaking && !isProcessing) {
                    setTimeout(() => {
                        try { recognition.start(); } catch (e) {
                            console.log('⚠️ Не удалось перезапустить');
                        }
                    }, 300);
                } else if (!isListening) {
                    setStatus('◈ ОЖИДАНИЕ ◈', 'waiting');
                }
            };

            recognition.onresult = (event) => {
                let final = '';
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        final += transcript;
                    } else {
                        interim += transcript;
                    }
                }

                const fullText = final || interim;
                console.log('🎤 Распознано:', fullText);

                // КЛЮЧЕВОЕ СЛОВО "ЗЕРКАЛО"
                if (fullText.toLowerCase().includes('зеркало') && !isSpeaking && !isProcessing) {
                    isWakeWordActive = true;
                    try { recognition.stop(); } catch (e) {}

                    const response = '◈ Я здесь. Чем могу помочь? ◈';
                    addMessage('🔊 Зеркало', 'user');
                    addMessage(response, 'assistant');
                    speakText(response);
                    return;
                }

                // Если есть финальный текст и мы уже активны
                if (final && final.trim().length > 0 && !isSpeaking && !isProcessing && isWakeWordActive) {
                    try { recognition.stop(); } catch (e) {}
                    addMessage(final, 'user');
                    sendToAI(final);
                }
            };

            return true;
        }

        function startRecognition() {
            if (isTelegram) return;
            if (!recognition) {
                const ok = initRecognition();
                if (!ok) return;
            }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('⛔ МИКРОФОН НЕ ПОДДЕРЖИВАЕТСЯ', 'error');
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    isListening = true;
                    isWakeWordActive = false;
                    setStatus('◈ СЛУШАЮ... ◈', 'listening');
                    try { recognition.start(); } catch (e) {
                        console.log('⚠️ Ошибка запуска:', e);
                    }
                })
                .catch(() => {
                    setStatus('⛔ НЕТ ДОСТУПА К МИКРОФОНУ', 'error');
                });
        }

        // ==========================================
        // ОТПРАВКА В AI
        // ==========================================

        async function sendToAI(userMessage) {
            if (isProcessing) return;
            isProcessing = true;
            thinkingIndicator.classList.add('active');

            try {
                // Проверка на QR
                const lower = userMessage.toLowerCase();
                if (lower.includes('qr') || lower.includes('код') || lower.includes('оплатить') || lower.includes(
                        'пополнить')) {
                    const qrUrl =
                        `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Оплата%201000%20тг%20Зеркало`;
                    addMessage(qrUrl, 'assistant', true);
                    const response = '◈ QR-код на 1000 ₸ сгенерирован. Отсканируйте в Kaspi. ◈';
                    addMessage(response, 'assistant');
                    speakText(response);
                    isProcessing = false;
                    thinkingIndicator.classList.remove('active');
                    return;
                }

                // Запрос к бэкенду
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userMessage,
                        history: dialogHistory,
                        user_id: userId
                    })
                });

                const data = await response.json();
                const aiResponse = data.response || '◈ Я не расслышала. Повтори, пожалуйста. ◈';

                dialogHistory.push({ role: 'user', content: userMessage });
                dialogHistory.push({ role: 'assistant', content: aiResponse });
                if (dialogHistory.length > 20) {
                    dialogHistory = dialogHistory.slice(-20);
                }

                addMessage(aiResponse, 'assistant');
                speakText(aiResponse);

            } catch (error) {
                console.error('Ошибка:', error);
                const fallback = '◈ Извини, у меня небольшая заминка. Давай ещё раз. ◈';
                addMessage(fallback, 'assistant');
                speakText(fallback);
            }

            isProcessing = false;
            thinkingIndicator.classList.remove('active');
        }

        // ==========================================
        // ЗАПУСК
        // ==========================================

        if (!isTelegram) {
            const ok = initRecognition();
            if (ok) {
                console.log('✅ Распознавание готово');
                console.log('🔊 Скажи "Зеркало" — я проснусь');
                setStatus('◈ ОЖИДАНИЕ ◈', 'waiting');
                startRecognition();
            } else {
                console.log('❌ Распознавание не поддерживается');
                setStatus('⛔ НЕ ПОДДЕРЖИВАЕТСЯ', 'error');
            }
        }

        console.log('🪞 Зеркало загружено — интерфейс Атлантиды');
        console.log('🔊 Ключевое слово: "Зеркало"');
        console.log('🎤 Никаких кнопок, только голос');
    </script>
</body>
</html>
