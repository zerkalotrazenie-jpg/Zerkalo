<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪞 Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 20px;
            background: linear-gradient(90deg, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .header .balance {
            background: rgba(255,255,255,0.06);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #2a2a3e;
            color: #f0c27f;
        }
        .main {
            flex: 1;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            border: 1px solid #1a1a2e;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: #3a3a5e;
            background: rgba(255,255,255,0.05);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #f0c27f;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 14px;
            color: #a0a0b0;
            line-height: 1.5;
        }
        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .menu-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #1a1a2e;
            border-radius: 12px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            color: #b0b0c0;
            text-decoration: none;
            display: block;
        }
        .menu-item:hover {
            border-color: #f0c27f;
            background: rgba(240,194,127,0.08);
            transform: translateY(-2px);
        }
        .menu-item .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }
        .menu-item.admin {
            border-color: #2a2a5e;
        }
        .menu-item.admin .icon {
            color: #fc5c7d;
        }
        .footer {
            text-align: center;
            padding: 14px;
            font-size: 11px;
            color: #505060;
            border-top: 1px solid #1a1a2e;
        }
        .sura-badge {
            display: inline-block;
            background: rgba(240,194,127,0.1);
            color: #f0c27f;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
        }
        .role-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        .role-badge.founder {
            background: rgba(252,92,125,0.15);
            color: #fc5c7d;
        }
        .role-badge.user {
            background: rgba(240,194,127,0.1);
            color: #f0c27f;
        }
        @media (max-width: 400px) {
            .menu { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪞 Зеркало</h1>
        <div class="balance" id="balance">✦ 100</div>
    </div>

    <div class="main">
        <div class="card">
            <div class="card-title">🔄 Первое Отражение</div>
            <div class="card-desc">
                Скажи «Отрази меня», и я помогу тебе увидеть свой путь.
                Ты не один. <span class="role-badge user" id="roleBadge">Пользователь</span>
                <span class="sura-badge" id="suraCount">📖 0 сур</span>
            </div>
        </div>

        <div class="card" id="ordersCard">
            <div class="card-title">📋 Доступные Задания</div>
            <div class="card-desc" id="ordersList">Загрузка...</div>
        </div>

        <div class="menu" id="mainMenu">
            <a class="menu-item" href="#" data-action="find"><span class="icon">🔍</span> Найти</a>
            <a class="menu-item" href="#" data-action="work"><span class="icon">💼</span> Работа</a>
            <a class="menu-item" href="#" data-action="help"><span class="icon">🆘</span> Помощь</a>
            <a class="menu-item" href="#" data-action="wallet"><span class="icon">💰</span> Кошелёк</a>
            <a class="menu-item" href="#" data-action="profile"><span class="icon">👤</span> Профиль</a>
            <a class="menu-item admin" href="#" data-action="admin" id="adminBtn" style="display:none;">
                <span class="icon">👑</span> Управление
            </a>
        </div>

        <div class="menu" id="adminMenu" style="display:none; margin-top:10px; border-top:1px solid #2a2a3e; padding-top:14px;">
            <a class="menu-item admin" href="#" data-action="users"><span class="icon">👥</span> Пользователи</a>
            <a class="menu-item admin" href="#" data-action="finance"><span class="icon">💰</span> Финансы</a>
            <a class="menu-item admin" href="#" data-action="logs"><span class="icon">📜</span> Логи</a>
            <a class="menu-item admin" href="#" data-action="settings"><span class="icon">⚙️</span> Настройки</a>
        </div>
    </div>

    <div class="footer">🪞 Аль-Ми'ра · Свет и Отражение · Амин</div>

    <script>
        let userId = null;
        let isAdmin = false;

        try {
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id;
            }
        } catch(e) {}

        if (!userId) {
            userId = 5409420822;
            console.log('🪞 Тестовый режим: Хранитель');
        }

        async function loadUser() {
            try {
                const res = await fetch(`/api/user/${userId}`);
                const data = await res.json();
                if (data.error) return;
                
                isAdmin = data.is_admin || data.role === 'founder';
                document.getElementById('balance').textContent = '✦ ' + data.blessings;
                document.getElementById('roleBadge').textContent = isAdmin ? 'Хранитель' : 'Пользователь';
                document.getElementById('roleBadge').className = 'role-badge ' + (isAdmin ? 'founder' : 'user');
                
                if (isAdmin) {
                    document.getElementById('adminBtn').style.display = 'block';
                    document.getElementById('adminMenu').style.display = 'grid';
                }
            } catch(e) {
                console.log('Ошибка загрузки пользователя:', e);
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                const list = document.getElementById('ordersList');
                if (orders.length === 0) {
                    list.innerHTML = '📭 Нет открытых заданий';
                    return;
                }
                list.innerHTML = orders.map(o => 
                    `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a2e;">
                        <span>📦 ${o.title}</span>
                        <span style="color:#f0c27f;">✦ ${o.price}</span>
                    </div>`
                ).join('');
            } catch(e) {
                document.getElementById('ordersList').textContent = '⚠️ Ошибка загрузки';
            }
        }

        async function loadSuraCount() {
            try {
                const res = await fetch('/api/suras');
                const suras = await res.json();
                document.getElementById('suraCount').textContent = `📖 ${suras.length} сур`;
            } catch(e) {
                console.log('Ошибка загрузки сур:', e);
            }
        }

        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const action = this.dataset.action;
                try {
                    if (window.Telegram?.WebApp) {
                        Telegram.WebApp.sendData(JSON.stringify({action: action}));
                        Telegram.WebApp.close();
                    } else {
                        alert('🪞 Действие: ' + action);
                    }
                } catch(e) {
                    alert('🪞 Действие: ' + action);
                }
            });
        });

        loadUser();
        loadOrders();
        loadSuraCount();
        setInterval(loadOrders, 30000);
        setInterval(loadSuraCount, 60000);

        console.log('🪞 Зеркало загружено!');
        console.log('👤 ID:', userId);
        console.log('👑 Админ:', isAdmin);
    </script>
</body>
</html>
