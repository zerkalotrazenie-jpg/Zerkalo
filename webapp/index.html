<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪞 Зеркало</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .balance {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #2a2a3e;
        }
        .main {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            flex: 1;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #1e1e2e;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .card:hover {
            border-color: #3a3a5e;
            background: rgba(255,255,255,0.06);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #f0c27f;
        }
        .card-desc {
            font-size: 14px;
            color: #a0a0b0;
            line-height: 1.5;
        }
        .card-badge {
            display: inline-block;
            background: rgba(240, 194, 127, 0.15);
            color: #f0c27f;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 8px;
        }
        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .menu-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #1e1e2e;
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            color: #c0c0d0;
        }
        .menu-item:hover {
            border-color: #f0c27f;
            background: rgba(240, 194, 127, 0.08);
            transform: translateY(-2px);
        }
        .menu-item .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 6px;
        }
        .footer {
            width: 100%;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #505060;
            border-top: 1px solid #1a1a2e;
        }
        @media (max-width: 400px) {
            .menu { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪞 Зеркало</h1>
        <div class="balance">✦ 100</div>
    </div>

    <div class="main">
        <div class="card">
            <div class="card-title">🔄 Первое Отражение</div>
            <div class="card-desc">
                Скажи «Отрази меня», и я помогу тебе увидеть свой путь.
                Ты не один.
            </div>
            <span class="card-badge">бесплатно</span>
        </div>

        <div class="card" style="border-color: #2a2a4e;">
            <div class="card-title">📋 Доступные Задания</div>
            <div class="card-desc">
                <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a2e;">
                    <span>🔧 Сварка трубы</span>
                    <span style="color:#f0c27f;">✦ 50</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a2e;">
                    <span>📦 Доставка груза</span>
                    <span style="color:#f0c27f;">✦ 120</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                    <span>🧹 Уборка офиса</span>
                    <span style="color:#f0c27f;">✦ 30</span>
                </div>
            </div>
        </div>

        <div class="menu">
            <div class="menu-item"><span class="icon">🔍</span>Найти</div>
            <div class="menu-item"><span class="icon">💼</span>Работа</div>
            <div class="menu-item"><span class="icon">🆘</span>Помощь</div>
            <div class="menu-item"><span class="icon">💰</span>Кошелёк</div>
            <div class="menu-item"><span class="icon">👤</span>Профиль</div>
            <div class="menu-item"><span class="icon">⚙️</span>Настройки</div>
        </div>
    </div>

    <div class="footer">
        🪞 Аль-Ми'ра · Свет и Отражение · Амин
    </div>

    <script>
        // Обработка кликов
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.textContent.trim();
                // Отправляем команду в Telegram
                if (window.Telegram && Telegram.WebApp) {
                    Telegram.WebApp.sendData(text);
                } else {
                    alert('Открываю: ' + text);
                }
            });
        });
    </script>
</body>
</html>
