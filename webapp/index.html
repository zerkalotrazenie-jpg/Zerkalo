<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #06060e;
            color: #d0d0e0;
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image:
                radial-gradient(circle at 30% 20%, rgba(240, 194, 127, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(252, 92, 125, 0.03) 0%, transparent 50%);
        }

        .mirror-container {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 10, 20, 0.7);
            border-radius: 30px;
            border: 1px solid rgba(240, 194, 127, 0.06);
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(240, 194, 127, 0.02);
            padding: 24px 20px 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .mirror-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(240, 194, 127, 0.03) 0%, transparent 60%);
            pointer-events: none;
            animation: shimmer 8s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(3deg); }
        }

        .mirror-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f0c27f 0%, #fc5c7d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            margin-bottom: 4px;
        }

        .mirror-subtitle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 5px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            margin-bottom: 12px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        .status-dot.inactive {
            background: #fc5c7d;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .status-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            position: relative;
            z-index: 1;
        }

        .chat-container {
            width: 100%;
            min-height: 180px;
            max-height: 260px;
            overflow-y: auto;
            padding: 8px 4px;
            margin: 10px 0;
            text-align: left;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 2px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(240, 194, 127, 0.15);
            border-radius: 10px;
        }

        .message {
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            max-width: 92%;
            word-wrap: break-word;
            animation: fadeSlide 0.3s ease;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user {
            background: rgba(240, 194, 127, 0.06);
            border: 1px solid rgba(240, 194, 127, 0.04);
            align-self: flex-end;
            margin-left: auto;
            text-align: right;
            color: #d0d0e0;
        }

        .message.assistant {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            align-self: flex-start;
            color: #c0c0d0;
        }

        .message .time {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.1);
            margin-top: 2px;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-message {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(240, 194, 127, 0.06);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            margin-top: 4px;
        }

        .qr-message img {
            max-width: 130px;
            border-radius: 10px;
            background: white;
            padding: 6px;
        }

        .qr-message .qr-label {
            font-size: 10px;
            color: #f0c27f;
            margin-top: 4px;
            opacity: 0.6;
        }

        .wake-indicator {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin-top: 4px;
            animation: pulse 2s infinite;
        }

        .wake-indicator.active {
            color: #4ade80;
        }

        .thinking-indicator {
            display: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            padding: 4px 0;
            animation: blink 1s infinite;
            position: relative;
            z-index: 1;
        }

        .thinking-indicator.active {
            display: block;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .warning-box {
            width: 100%;
            max-width: 500px;
            background: rgba(252, 92, 125, 0.04);
            border: 1px solid rgba(252, 92, 125, 0.06);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #fc5c7d;
            text-align: center;
            display: none;
        }

        .warning-box .browser-btn {
            margin-top: 4px;
            padding: 6px 18px;
            background: linear-gradient(135deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
            border: none;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 400px) {
            .mirror-container {
                padding: 16px 14px;
            }
            .mirror-title {
                font-size: 22px;
            }
            .chat-container {
                min-height: 140px;
                max-height: 200px;
            }
            .message {
                font-size: 13px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="mirror-container">
        <div class="mirror-title">🪞 Зеркало</div>
        <div class="mirror-subtitle">Аль-Ми'ра</div>

        <div style="margin-bottom: 8px; position:relative; z-index:1;">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Скажите «Зеркало»</span>
        </div>

        <div class="warning-box" id="telegramWarning">
            ⚠️ В Telegram WebView голос не работает.<br>
            <button class="browser-btn" id="openBrowserBtn">🌐 Открыть в браузере</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant" id="welcomeMsg">
                🪞 Ассаляму алейкум.<br>
                Скажите слово <strong>«Зеркало»</strong> — я проснусь.
                <div class="time" id="welcomeTime"></div>
            </div>
        </div>

        <div class="thinking-indicator" id="thinkingIndicator">🪞 Думаю...</div>

        <div class="wake-indicator" id="wakeIndicator">🔊 Скажите «Зеркало», чтобы начать</div>
    </div>

    <script>
        // ==========================================
        // 🪞 ЗЕРКАЛО — ТОЧНАЯ КОПИЯ АЛИСЫ
        // ==========================================

        const chatContainer = document.getElementById('chatContainer');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const thinkingIndicator = document.getElementById('thinkingIndicator');
        const wakeIndicator = document.getElementById('wakeIndicator');
        const welcomeTime = document.getElementById('welcomeTime');

        let recognition = null;
        let synthesis = window.speechSynthesis;
        let isSpeaking = false;
        let isProcessing = false;
        let isWakeWordActive = false;
        let dialogHistory = [];
        let isListening = false;
        let restartTimeout = null;

        // ==========================================
        // ВРЕМЯ
        // ==========================================

        if (welcomeTime) {
            welcomeTime.textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ==========================================
        // ОПРЕДЕЛЕНИЕ TELEGRAM
        // ==========================================

        const isTelegram = !!(window.Telegram && window.Telegram.WebApp) ||
            navigator.userAgent.indexOf('Telegram') !== -1;

        if (isTelegram) {
            document.getElementById('telegramWarning').style.display = 'block';
            statusText.textContent = 'Голос не доступен в Telegram';
            statusDot.className = 'status-dot inactive';
            wakeIndicator.textContent = '❌ Откройте в браузере';
        }

        document.getElementById('openBrowserBtn').addEventListener('click', function() {
            const url = window.location.href;
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Ссылка скопирована. Откройте в браузере.');
                });
            }
        });

        // ==========================================
        // СТАТУС И СООБЩЕНИЯ
        // ==========================================

        function setStatus(text, isActive = true) {
            statusText.textContent = text;
            statusDot.className = isActive ? 'status-dot' : 'status-dot inactive';
            if (isActive && text.includes('Скажите')) {
                wakeIndicator.textContent = '🔊 Скажите «Зеркало», чтобы начать';
                wakeIndicator.style.color = 'rgba(255,255,255,0.15)';
            } else if (isActive && text.includes('Слушаю')) {
                wakeIndicator.textContent = '🎤 Слушаю...';
                wakeIndicator.style.color = '#4ade80';
                wakeIndicator.className = 'wake-indicator active';
            }
        }

        function addMessage(text, sender = 'assistant', isQR = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            if (isQR) {
                msgDiv.innerHTML = `
                    <div class="qr-message">
                        <img src="${text}" alt="QR-код">
                        <div class="qr-label">💳 Сумма: 1000 ₸</div>
                    </div>
                    <div class="time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML = `${text}<div class="time">${time}</div>`;
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // ==========================================
        // ГОЛОС (СИНТЕЗ)
        // ==========================================

        function speakText(text, callback) {
            if (!synthesis || isTelegram) {
                if (callback) callback();
                return;
            }

            if (synthesis.speaking) synthesis.cancel();

            const trySpeak = () => {
                const voices = synthesis.getVoices();
                let selected = voices.find(v => v.lang.startsWith('ru') && v.name.includes('Google') && v.name.includes(
                    'Female')) ||
                    voices.find(v => v.lang.startsWith('ru') && v.name.includes('Female')) ||
                    voices.find(v => v.lang.startsWith('ru'));

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                if (selected) utterance.voice = selected;
                utterance.rate = 0.82;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                utterance.onstart = () => {
                    isSpeaking = true;
                    setStatus('Говорит...', true);
                };

                utterance.onend = () => {
                    isSpeaking = false;
                    if (!isListening) {
                        setStatus('Слушаю...', true);
                    }
                    if (callback) callback();
                    // После ответа снова слушаем
                    if (recognition && isListening) {
                        try { recognition.start(); } catch (e) {}
                    }
                };

                utterance.onerror = () => {
                    isSpeaking = false;
                    if (!isListening) {
                        setStatus('Слушаю...', true);
                    }
                    if (callback) callback();
                    if (recognition && isListening) {
                        try { recognition.start(); } catch (e) {}
                    }
                };

                synthesis.speak(utterance);
            };

            if (synthesis.getVoices().length > 0) {
                trySpeak();
            } else {
                synthesis.onvoiceschanged = () => {
                    trySpeak();
                    synthesis.onvoiceschanged = null;
                };
                setTimeout(trySpeak, 1000);
            }
        }

        // ==========================================
        // РАСПОЗНАВАНИЕ РЕЧИ (КЛЮЧЕВОЕ СЛОВО)
        // ==========================================

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition || isTelegram) return false;

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                setStatus('Слушаю...', true);
                wakeIndicator.textContent = '🎤 Слушаю...';
                wakeIndicator.style.color = '#4ade80';
                wakeIndicator.className = 'wake-indicator active';
                console.log('🎤 Микрофон активен');
            };

            recognition.onerror = (event) => {
                console.error('Ошибка распознавания:', event.error);
                if (event.error === 'not-allowed') {
                    setStatus('Нет доступа к микрофону', false);
                    isListening = false;
                    wakeIndicator.textContent = '❌ Нет доступа к микрофону';
                    wakeIndicator.style.color = '#fc5c7d';
                    return;
                }
                if (event.error === 'no-speech') {
                    // Перезапускаем
                    if (isListening) {
                        try { recognition.start(); } catch (e) {}
                    }
                }
            };

            recognition.onend = () => {
                console.log('🔴 Распознавание остановлено');
                if (isListening && !isSpeaking && !isProcessing) {
                    setTimeout(() => {
                        try { recognition.start(); } catch (e) {
                            console.log('⚠️ Не удалось перезапустить');
                        }
                    }, 300);
                } else if (!isListening) {
                    setStatus('Скажите «Зеркало»', true);
                    wakeIndicator.textContent = '🔊 Скажите «Зеркало», чтобы начать';
                    wakeIndicator.style.color = 'rgba(255,255,255,0.15)';
                }
            };

            recognition.onresult = (event) => {
                let final = '';
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        final += transcript;
                    } else {
                        interim += transcript;
                    }
                }

                const fullText = final || interim;
                console.log('🎤 Распознано:', fullText);

                // КЛЮЧЕВОЕ СЛОВО "ЗЕРКАЛО"
                if (fullText.toLowerCase().includes('зеркало') && !isSpeaking && !isProcessing) {
                    // Просыпаемся
                    isWakeWordActive = true;
                    try { recognition.stop(); } catch (e) {}

                    const response = 'Я здесь. Чем могу помочь?';
                    addMessage('🔊 Зеркало', 'user');
                    addMessage(response, 'assistant');
                    speakText(response);
                    return;
                }

                // Если есть финальный текст и мы уже активны
                if (final && final.trim().length > 0 && !isSpeaking && !isProcessing && isWakeWordActive) {
                    try { recognition.stop(); } catch (e) {}
                    addMessage(final, 'user');
                    sendToAI(final);
                }
            };

            return true;
        }

        function startRecognition() {
            if (isTelegram) return;
            if (!recognition) {
                const ok = initRecognition();
                if (!ok) return;
            }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('Микрофон не поддерживается', false);
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    isListening = true;
                    isWakeWordActive = false;
                    setStatus('Слушаю...', true);
                    wakeIndicator.textContent = '🎤 Слушаю...';
                    wakeIndicator.style.color = '#4ade80';
                    wakeIndicator.className = 'wake-indicator active';
                    try { recognition.start(); } catch (e) {
                        console.log('⚠️ Ошибка запуска:', e);
                    }
                })
                .catch(() => {
                    setStatus('Нет доступа к микрофону', false);
                    wakeIndicator.textContent = '❌ Нет доступа к микрофону';
                    wakeIndicator.style.color = '#fc5c7d';
                });
        }

        // ==========================================
        // ОТПРАВКА В AI (Groq API)
        // ==========================================

        async function sendToAI(userMessage) {
            if (isProcessing) return;
            isProcessing = true;
            thinkingIndicator.classList.add('active');

            try {
                // Проверка на QR
                const lower = userMessage.toLowerCase();
                if (lower.includes('qr') || lower.includes('код') || lower.includes('оплатить') || lower.includes(
                        'пополнить')) {
                    const qrUrl =
                        `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Оплата%201000%20тг%20Зеркало`;
                    addMessage(qrUrl, 'assistant', true);
                    const response = '💳 QR-код на 1000 ₸ сгенерирован. Отсканируйте в Kaspi.';
                    addMessage(response, 'assistant');
                    speakText(response);
                    isProcessing = false;
                    thinkingIndicator.classList.remove('active');
                    return;
                }

                // Запрос к бэкенду
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userMessage,
                        history: dialogHistory
                    })
                });

                const data = await response.json();
                const aiResponse = data.response || 'Я не расслышала. Повтори, пожалуйста.';

                dialogHistory.push({ role: 'user', content: userMessage });
                dialogHistory.push({ role: 'assistant', content: aiResponse });
                if (dialogHistory.length > 20) {
                    dialogHistory = dialogHistory.slice(-20);
                }

                addMessage(aiResponse, 'assistant');
                speakText(aiResponse);

            } catch (error) {
                console.error('Ошибка:', error);
                const fallback = 'Извини, у меня небольшая заминка. Давай ещё раз.';
                addMessage(fallback, 'assistant');
                speakText(fallback);
            }

            isProcessing = false;
            thinkingIndicator.classList.remove('active');
        }

        // ==========================================
        // ЗАПУСК
        // ==========================================

        if (!isTelegram) {
            const ok = initRecognition();
            if (ok) {
                console.log('✅ Распознавание готово');
                console.log('🔊 Скажи "Зеркало" — я проснусь');
                setStatus('Скажите «Зеркало»', true);
                // Автоматически запускаем микрофон
                startRecognition();
            } else {
                console.log('❌ Распознавание не поддерживается');
                setStatus('Не поддерживается', false);
            }
        }

        console.log('🪞 Зеркало загружено — точная копия Алисы');
        console.log('🔊 Ключевое слово: "Зеркало"');
        console.log('🎤 Никаких кнопок, только голос');
    </script>
</body>
</html>
