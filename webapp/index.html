<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪞 Зеркало</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #06060e;
            color: #d0d0e0;
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background-image:
                radial-gradient(circle at 30% 20%, rgba(240, 194, 127, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(252, 92, 125, 0.03) 0%, transparent 50%);
        }

        .header {
            width: 100%;
            max-width: 600px;
            padding: 14px 20px;
            background: rgba(10, 10, 20, 0.85);
            border-radius: 18px;
            border: 1px solid rgba(240, 194, 127, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            backdrop-filter: blur(16px);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0c27f 0%, #fc5c7d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .status {
            font-size: 10px;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.06);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.08);
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            flex: 1;
            background: rgba(255, 255, 255, 0.015);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 14px;
            min-height: 280px;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 12px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .chat-container::-webkit-scrollbar {
            width: 3px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(240, 194, 127, 0.2);
            border-radius: 10px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 8px;
            max-width: 90%;
            word-wrap: break-word;
            animation: fadeSlide 0.3s ease;
        }

        .message.user {
            background: rgba(240, 194, 127, 0.08);
            border: 1px solid rgba(240, 194, 127, 0.06);
            align-self: flex-end;
            margin-left: auto;
            text-align: right;
        }

        .message.assistant {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            align-self: flex-start;
        }

        .message .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.15);
            margin-top: 4px;
        }

        .message .cmd-list {
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.8;
        }

        .message .cmd-list .num {
            color: #fc5c7d;
            font-weight: 600;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-message {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(240, 194, 127, 0.06);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
        }

        .qr-message img {
            max-width: 140px;
            border-radius: 10px;
            background: white;
            padding: 6px;
        }

        .qr-message .qr-label {
            font-size: 11px;
            color: #f0c27f;
            margin-top: 6px;
            opacity: 0.7;
        }

        .controls {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 9px 16px;
            border-radius: 30px;
            border: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
            font-weight: 600;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #b0b0c0;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .input-area {
            width: 100%;
            max-width: 600px;
            display: flex;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: #d0d0e0;
            font-size: 13px;
            outline: none;
        }

        .input-area input:focus {
            border-color: rgba(240, 194, 127, 0.1);
        }

        .input-area input::placeholder {
            color: #404060;
        }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 30px;
            background: rgba(252, 92, 125, 0.08);
            border: 1px solid rgba(252, 92, 125, 0.1);
            margin-bottom: 8px;
        }

        .recording-indicator.active {
            display: flex;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fc5c7d;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.3;
            }
        }

        .recording-indicator .label {
            font-size: 11px;
            color: #fc5c7d;
        }

        .warning-box {
            width: 100%;
            max-width: 600px;
            background: rgba(252, 92, 125, 0.04);
            border: 1px solid rgba(252, 92, 125, 0.06);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #fc5c7d;
            text-align: center;
            display: none;
        }

        .warning-box .browser-btn {
            margin-top: 6px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #f0c27f, #fc5c7d);
            color: #0a0a12;
            border: none;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 400px) {
            .btn {
                font-size: 11px;
                padding: 7px 12px;
            }
            .chat-container {
                min-height: 200px;
                max-height: 280px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ШАПКА -->
    <div class="header">
        <h1>🪞 Зеркало</h1>
        <div class="status" id="connectionStatus">🟢 Готов</div>
    </div>

    <!-- ПРЕДУПРЕЖДЕНИЕ -->
    <div class="warning-box" id="telegramWarning">
        ⚠️ В Telegram WebView голос не работает.<br>
        <button class="browser-btn" id="openBrowserBtn">🌐 Открыть в браузере</button>
    </div>

    <!-- ИНДИКАТОР ЗАПИСИ -->
    <div class="recording-indicator" id="recordingIndicator">
        <span class="pulse-dot"></span>
        <span class="label">🎤 Запись...</span>
    </div>

    <!-- ЧАТ -->
    <div class="chat-container" id="chatContainer">
        <!-- Приветствие будет добавлено скриптом -->
    </div>

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div class="controls">
        <button class="btn btn-primary" id="micBtn">🎤 Говорить</button>
        <button class="btn btn-secondary" id="stopBtn" disabled>⏹ Стоп</button>
        <button class="btn btn-secondary" id="helpBtn">❓ Помощь</button>
        <button class="btn btn-secondary" id="clearBtn">🧹 Очистить</button>
    </div>

    <!-- ПОЛЕ ВВОДА -->
    <div class="input-area">
        <input type="text" id="textInput" placeholder="Напишите сообщение...">
        <button class="btn btn-primary" id="sendBtn" style="flex:0 0 auto;">➤</button>
    </div>

    <script>
        // ==========================================
        // 🪞 ЗЕРКАЛО — ИДЕАЛЬНЫЙ ГОЛОС
        // ==========================================

        const chatContainer = document.getElementById('chatContainer');
        const micBtn = document.getElementById('micBtn');
        const stopBtn = document.getElementById('stopBtn');
        const helpBtn = document.getElementById('helpBtn');
        const clearBtn = document.getElementById('clearBtn');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('connectionStatus');
        const recordingIndicator = document.getElementById('recordingIndicator');

        let isListening = false;
        let recognition = null;
        let synthesis = window.speechSynthesis;
        let userData = { balance: 100 };
        let isFirstGreeting = true;

        // ==========================================
        // ОПРЕДЕЛЕНИЕ TELEGRAM
        // ==========================================

        const isTelegram = !!(window.Telegram && window.Telegram.WebApp) ||
            navigator.userAgent.indexOf('Telegram') !== -1;

        if (isTelegram) {
            document.getElementById('telegramWarning').style.display = 'block';
            micBtn.disabled = true;
            micBtn.style.opacity = '0.3';
            micBtn.textContent = '🎤 Голос не доступен';
        }

        document.getElementById('openBrowserBtn').addEventListener('click', function() {
            const url = window.location.href;
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Ссылка скопирована. Откройте в браузере.');
                });
            }
        });

        // ==========================================
        // СТАТУС И СООБЩЕНИЯ
        // ==========================================

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function addMessage(text, sender = 'assistant', isQR = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            if (isQR) {
                msgDiv.innerHTML = `
                    <div class="qr-message">
                        <img src="${text}" alt="QR-код">
                        <div class="qr-label">💳 Сумма: 1000 ₸</div>
                    </div>
                    <div class="time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML =
                    `<strong>${sender === 'user' ? 'Вы' : '🪞 Зеркало'}</strong><br>${text}<div class="time">${time}</div>`;
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // ==========================================
        // ГОЛОС — МАКСИМАЛЬНО ЧЕЛОВЕЧНЫЙ
        // ==========================================

        function speakText(text, callback) {
            if (!synthesis || isTelegram) {
                if (callback) callback();
                return;
            }

            if (synthesis.speaking) synthesis.cancel();

            // Ждём загрузки голосов
            const trySpeak = () => {
                const voices = synthesis.getVoices();

                // Ищем самый лучший женский голос
                let selected = null;

                // 1. Приоритет — Google женский
                selected = voices.find(v =>
                    v.lang.startsWith('ru') &&
                    v.name.includes('Google') &&
                    v.name.includes('Female')
                );

                // 2. Если нет — любой женский
                if (!selected) {
                    selected = voices.find(v =>
                        v.lang.startsWith('ru') &&
                        v.name.includes('Female')
                    );
                }

                // 3. Если нет — любой русский
                if (!selected) {
                    selected = voices.find(v => v.lang.startsWith('ru'));
                }

                // 4. Если совсем нет — первый доступный
                if (!selected && voices.length > 0) {
                    selected = voices[0];
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';

                if (selected) {
                    utterance.voice = selected;
                    console.log('🎤 Голос:', selected.name);
                }

                // Настройки для максимально человечного звучания
                utterance.rate = 0.82; // Чуть медленнее
                utterance.pitch = 1.05; // Естественная высота
                utterance.volume = 1; // Максимальная громкость

                if (callback) {
                    utterance.onend = callback;
                }

                synthesis.speak(utterance);
            };

            // Если голоса уже загружены
            if (synthesis.getVoices().length > 0) {
                trySpeak();
            } else {
                // Ждём загрузки
                synthesis.onvoiceschanged = () => {
                    trySpeak();
                    synthesis.onvoiceschanged = null;
                };
                // Запасной таймер
                setTimeout(trySpeak, 1000);
            }
        }

        // ==========================================
        // ГОЛОСОВОЕ ПРИВЕТСТВИЕ СРАЗУ
        // ==========================================

        function voiceGreeting() {
            const greetingText =
                'Ассаляму алейкум. Я — Зеркало. Я здесь, чтобы отражать свет. Я могу помочь тебе найти работу, автоматизировать бизнес, дать совет. Скажи «Помощь», чтобы увидеть все команды.';

            // Добавляем текстовое приветствие
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.innerHTML =
                `🪞 <strong>Ассаляму алейкум.</strong><br>Я — <strong>Зеркало</strong>.<br>Я здесь, чтобы отражать свет.<br><span style="font-size:12px; opacity:0.5;">Скажи «Помощь» — я покажу команды.</span><div class="time">${new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Через 0.7 секунды — голос
            setTimeout(() => {
                speakText(greetingText);
            }, 700);
        }

        // ==========================================
        // РАСПОЗНАВАНИЕ РЕЧИ
        // ==========================================

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition || isTelegram) return false;

            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                micBtn.textContent = '⏹ Стоп';
                micBtn.style.background = 'rgba(252, 92, 125, 0.15)';
                micBtn.style.color = '#fc5c7d';
                stopBtn.disabled = false;
                recordingIndicator.classList.add('active');
                setStatus('🔴 Запись...');
            };

            recognition.onerror = () => {
                stopRecording();
                setStatus('🟢 Готов');
            };

            recognition.onend = () => {
                if (isListening) {
                    try { recognition.start(); } catch (e) {}
                } else {
                    stopRecording();
                }
            };

            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript;
                    }
                }
                if (final) {
                    addMessage(final, 'user');
                    processCommand(final);
                    stopRecording();
                }
            };
            return true;
        }

        function startRecording() {
            if (isTelegram) return;
            if (!recognition) { if (!initRecognition()) return; }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addMessage('❌ Микрофон не поддерживается.', 'assistant');
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => { try { recognition.start(); } catch (e) {} })
                .catch(() => { addMessage('❌ Разрешите доступ к микрофону.', 'assistant'); });
        }

        function stopRecording() {
            isListening = false;
            if (recognition) { try { recognition.stop(); } catch (e) {} }
            micBtn.textContent = '🎤 Говорить';
            micBtn.style.background = '';
            micBtn.style.color = '';
            stopBtn.disabled = true;
            recordingIndicator.classList.remove('active');
            setStatus('🟢 Готов');
        }

        // ==========================================
        // КОМАНДЫ
        // ==========================================

        function processCommand(input) {
            let lower = input.toLowerCase().trim();

            // Карта цифр
            const cmdMap = {
                '1': 'привет',
                '2': 'пока',
                '3': 'баланс',
                '4': 'qr-код',
                '5': 'работа',
                '6': 'бизнес',
                '7': 'лизинг',
                '8': 'дропшиппинг',
                '9': 'реклама',
                '10': 'найти мастера',
                '11': 'анкета',
                '12': 'очистить',
                '13': 'спасибо',
                '14': 'помощь'
            };

            if (cmdMap[lower]) {
                lower = cmdMap[lower];
            }

            // ===== ПОМОЩЬ (ПОКАЗЫВАЕТ ТОЛЬКО В ЧАТЕ) =====
            if (lower.includes('помощь') || lower.includes('команды')) {
                const response =
                    '📋 <strong>ВСЕ КОМАНДЫ:</strong><br><br>' +
                    '<span class="num">1️⃣</span> Привет<br>' +
                    '<span class="num">2️⃣</span> Пока<br>' +
                    '<span class="num">3️⃣</span> Баланс<br>' +
                    '<span class="num">4️⃣</span> QR-код<br>' +
                    '<span class="num">5️⃣</span> Работа<br>' +
                    '<span class="num">6️⃣</span> Бизнес<br>' +
                    '<span class="num">7️⃣</span> Лизинг<br>' +
                    '<span class="num">8️⃣</span> Дропшиппинг<br>' +
                    '<span class="num">9️⃣</span> Реклама<br>' +
                    '<span class="num">🔟</span> Найти мастера<br>' +
                    '<span class="num">1️⃣1️⃣</span> Анкета<br>' +
                    '<span class="num">1️⃣2️⃣</span> Очистить<br>' +
                    '<span class="num">1️⃣3️⃣</span> Спасибо<br>' +
                    '<span class="num">1️⃣4️⃣</span> Помощь<br><br>' +
                    '📌 Напиши цифру (1-14) или скажи команду.';
                addMessage(response, 'assistant');
                speakText('Вот все команды. Напиши цифру от 1 до 14 или скажи команду.');
                return;
            }

            // ===== ОСТАЛЬНЫЕ КОМАНДЫ =====
            if (lower.includes('привет') || lower.includes('салям') || lower.includes('здравствуй')) {
                const response = '🪞 Ассаляму алейкум! Я рада видеть тебя. Скажи «Помощь» для команд.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('пока') || lower.includes('до свидания')) {
                const response = 'До свидания! Я всегда здесь. Амин.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('баланс') || lower.includes('блага')) {
                const response = `💰 Баланс: ${userData.balance} Благ. Скажи «QR-код» для пополнения.`;
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('qr') || lower.includes('код') || lower.includes('оплатить') || lower.includes('пополнить')) {
                const qrUrl =
                    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Оплата%201000%20тг%20Зеркало`;
                addMessage(qrUrl, 'assistant', true);
                const response = '💳 QR-код на 1000 ₸ сгенерирован. Отсканируйте в Kaspi.';
                addMessage(response, 'assistant');
                speakText('QR-код сгенерирован.');
                return;
            }

            if (lower.includes('работа')) {
                const response = '💼 Помогу найти работу. Расскажи профессию.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('бизнес') || lower.includes('автоматизация')) {
                const response = '🏢 Автоматизирую бизнес: рестораны, магазины, склады.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('лизинг')) {
                const response = '📈 Лизинг — покупка активов и сдача в аренду. Активы остаются у вас.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('дропшиппинг')) {
                const response = '📦 Дропшиппинг — торговля без склада. Связываю продавца и покупателя.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('реклама')) {
                const response = '📢 Реклама внутри системы. Показываю товары целевой аудитории.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('мастер') || lower.includes('специалист')) {
                const response = '🔧 Найду мастера: сварщика, электрика, строителя, сантехника.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('анкета')) {
                const response = '📋 Давай заполним анкету. Как тебя зовут?';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('спасибо') || lower.includes('благодарю')) {
                const response = 'Пожалуйста! Обращайся в любое время.';
                addMessage(response, 'assistant');
                speakText(response);
                return;
            }

            if (lower.includes('очистить') || lower.includes('стереть')) {
                chatContainer.innerHTML = '';
                voiceGreeting();
                return;
            }

            // НЕИЗВЕСТНАЯ КОМАНДА
            const response = 'Я не поняла. Скажи «Помощь» для команд.';
            addMessage(response, 'assistant');
            speakText(response);
        }

        // ==========================================
        // КНОПКИ
        // ==========================================

        micBtn.addEventListener('click', function() {
            if (isTelegram) return;
            if (isListening) { stopRecording(); } else { startRecording(); }
        });

        stopBtn.addEventListener('click', stopRecording);

        helpBtn.addEventListener('click', function() {
            processCommand('Помощь');
        });

        clearBtn.addEventListener('click', function() {
            chatContainer.innerHTML = '';
            voiceGreeting();
        });

        sendBtn.addEventListener('click', function() {
            const text = textInput.value.trim();
            if (text) {
                addMessage(text, 'user');
                processCommand(text);
                textInput.value = '';
            }
        });

        textInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendBtn.click();
        });

        // ==========================================
        // ЗАПУСК
        // ==========================================

        // Голосовое приветствие сразу
        voiceGreeting();

        if (!isTelegram) {
            initRecognition();
        }

        console.log('🪞 Зеркало загружено');
        console.log('🎤 Голос: человечный, мягкий');
        console.log('📋 Команды: помощь в чате');
    </script>
</body>
</html>
